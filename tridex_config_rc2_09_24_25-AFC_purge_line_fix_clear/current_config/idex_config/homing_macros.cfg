#####################################################################
#
#  This file contains homing specific macros and necessary overrides
#  in order for an IDEX machine to function as expected.
#
#  Macros within this file:
#
#      homing_override
#      IDEX_HOME_Y
#      IDEX_HOME_X
#      CHOME
#      Z_TILT_ADJUST (override)
#      QUAD_GANTRY_LEVEL (override)
#      BED_MESH_CALIBRATE (override)
#
#  Dockable probe macros:
#
#      _ATTACH_PROBE
#      _DOCK_PROBE
#      PROBE_ACCURACY (override)
#      _CheckProbe
#      _SetProbeState
#
#####################################################################

#####################################################################
#   homing_override
#   For homing when an inductive probe or double tap is installed
#   uncommment the line in the print_start macro for quicker probing
#   ALL VARIABLES FOR HOMING ARE IN idex_variables.cfg under the macro IDEX_VARS
#####################################################################

[homing_override]
#description: Override the stock homing behavior.
axes:xyz
gcode:
    {% set idxvars = printer["gcode_macro IDEX_VARS"] %}
    {% set safe_home_x = idxvars.homing_safe_x|float %}
    {% set safe_home_y = idxvars.homing_safe_y|float %}
    {% set safe_home_feed = idxvars.homing_feedrate|int %}
    # Reset parameters.
    {% set X, Y, Z = False, False, False %}
    # Which axes have been requested for homing.
    {% if not 'X' in params
        and not 'Y' in params
        and not 'Z' in params %}
        {% set X, Y, Z = True, True, True %}
        # Drop the bed 10mm.
        SET_KINEMATIC_POSITION Z=0
        G1 Z10 F2000
    {% else %}
        {% if 'X' in params %}
            {% set X = True %}
        {% endif %}
        {% if 'Y' in params %}
            {% set Y = True %}
        {% endif %}
        {% if 'Z' in params %}
            {% set Z = True %}
        {% endif %}
    {% endif %}
    # If toolhead 1 was left active, clear the X and Y offsets in case the Y offset is negative
    # Causes a move out of range error when trying to home.
    {% if printer.dual_carriage.carriage_0 == "INACTIVE" %}
        SET_DUAL_CARRIAGE CARRIAGE=0
        ACTIVATE_EXTRUDER EXTRUDER=extruder
        SET_GCODE_OFFSET X=0 Y=0 Z={printer.gcode_move.homing_origin.z|round(6)|float - idxvars.offset_z|round(6)|float} MOVE=0
        SET_GCODE_VARIABLE MACRO=T1 VARIABLE=color VALUE="''"
        SET_GCODE_VARIABLE MACRO=T2 VARIABLE=color VALUE="''"
        SET_GCODE_VARIABLE MACRO=T3 VARIABLE=color VALUE="''"
        SET_GCODE_VARIABLE MACRO=T4 VARIABLE=color VALUE="''"
    {% endif %}
    # Home Y.
    {% if Y %}
        { action_respond_info("Homing Y") }
        IDEX_HOME_Y
    {% endif %}
    # Home X.
    {% if X %}
        { action_respond_info("Homing X") }
        IDEX_HOME_X
    {% endif %}
    # Home Z.
    {% if Z %}
        { action_respond_info("Homing Z") }
        IDEX_HOME_Z
    {% endif %}
    SET_GCODE_VARIABLE MACRO=IDEX_VARS VARIABLE=active_tool VALUE=0

#####################################################################
#  IDEX Home Z Routine
#####################################################################
[gcode_macro IDEX_HOME_Z]
description: Override for Z homing
gcode:
    {% set idxvars = printer["gcode_macro IDEX_VARS"] %}
    {% set safe_home_x = idxvars.homing_safe_x|float %}
    {% set safe_home_y = idxvars.homing_safe_y|float %}
    {% set safe_home_feed = idxvars.homing_feedrate|int %}
    # Make sure T0 is active.
    {% if printer.dual_carriage.carriage_0 == "INACTIVE" %}
        {% if idxvars.debug_level|int > 0 %}
            RESPOND MSG="Home Z - Toolhead 1 left active, activating Toolhead 0 for homing."
        {% endif %}
        # Get current position of T1 and see if it is beyond the limits of T0.
        {% if printer.gcode_move.gcode_position.x|float > printer.configfile.config.stepper_x.position_max|float %}
            # T0 cant reach, activate it manually before moving it to safe home position.
            {% if idxvars.debug_level|int > 0 %}
                RESPOND MSG="Home Z - Toolhead 1 beyond Toolhead 0 limits, activating T0."
            {% endif %}
            SET_DUAL_CARRIAGE CARRIAGE=0
            ACTIVATE_EXTRUDER EXTRUDER=extruder
        {% else %}
            # T0 can reach, park T1 and carry on.
            T0
        {% endif %}
    {% endif %}
    # Check if the user is using a dockable probe.
    {% if idxvars.docking_probe %}
        # if probe is configured as endstop, attach it, else dock the probe if attached.
        {% if printer['configfile'].config["stepper_z"]["endstop_pin"] == 'probe:z_virtual_endstop' %}
            RESPOND MSG="Using dockable probe as Z endstop, attaching probe."
            _ATTACH_PROBE
        {% else %}
            RESPOND MSG="Docking probe."
            _DOCK_PROBE
        {% endif %}
    {% endif %}
    # Move to safe home position.
    G0 X{safe_home_x} Y{safe_home_y} F{safe_home_feed}
    {% if idxvars.debug_level|int > 1 %}
        RESPOND MSG="Home Z - Moved toolhead 0 to safe home position."
    {% endif %}
    {% if idxvars.toolhead_led %}
        STATUS_HOMING
        SET_DUAL_CARRIAGE CARRIAGE=1
        STATUS_HOMING
        SET_DUAL_CARRIAGE CARRIAGE=0
    {% endif %}
    # Home Z.
    G28 Z
    # Lower bed 10mm.
    G0 Z10
    {% if idxvars.toolhead_led %}
        STATUS_READY
        SET_DUAL_CARRIAGE CARRIAGE=1
        STATUS_READY
        SET_DUAL_CARRIAGE CARRIAGE=0
    {% endif %}
    {% if idxvars.docking_probe and printer['configfile'].config["stepper_z"]["endstop_pin"] == 'probe:z_virtual_endstop' %}
        # If a dockable probe used as z endstop, dock the probe.
        _DOCK_PROBE
    {% endif %}
    
#####################################################################
#  IDEX Home Y Routine
#####################################################################

[gcode_macro IDEX_HOME_Y]
description: Override for Y homing.
gcode:
    {% set idxvars = printer["gcode_macro IDEX_VARS"] %}
    {% if idxvars.toolhead_led %}
        STATUS_HOMING
        SET_DUAL_CARRIAGE CARRIAGE=1
        STATUS_HOMING
        SET_DUAL_CARRIAGE CARRIAGE=0
   {% endif %}
    # Home Y.
    G28 Y
    # Relative positioning.
    G91
    # Move away from the back by 25mm.
    {% if idxvars.debug_level|int > 0 %}
        RESPOND MSG="Moving Y forward by 25mm."
    {% endif %}
    G0 Y-25 F2400
    # Return to absolute positioning.
    G90
    {% if idxvars.toolhead_led %}
        STATUS_READY
        SET_DUAL_CARRIAGE CARRIAGE=1
        STATUS_READY
        SET_DUAL_CARRIAGE CARRIAGE=0
    {% endif %}

#####################################################################
#  IDEX Home X Routine
#####################################################################

[gcode_macro IDEX_HOME_X]
description: Override for X homing.
gcode:
    {% set idxvars = printer["gcode_macro IDEX_VARS"] %}
    {% set prev_z_offset = printer.gcode_move.homing_origin.z|round(6)|float %}
    {% set bed_center = (printer.configfile.config.stepper_x.position_min|float + printer.configfile.config.dual_carriage.position_max|float) / 2 %}
    {% set homing_left = "True" %}
    # Check to see if T1 homes to the right.
    {% if idxvars.debug_level|int > 0 %}
        RESPOND MSG="The Bed center is at {bed_center}"
    {% endif %}
    {% if printer.configfile.config.dual_carriage.position_endstop|float > bed_center|float %}
        {% set homing_left = "False" %}
        {% if idxvars.debug_level|int > 0 %}
            RESPOND MSG="Homing left is {homing_left}"
        {% endif %}
    {% endif %}
    # Check to see if T1 was left active.
    {% if printer.toolhead.extruder == "extruder1" %}
        SET_DUAL_CARRIAGE CARRIAGE=0
        ACTIVATE_EXTRUDER EXTRUDER=extruder
        {% set prev_z_offset = (prev_z_offset - idxvars.offset_z)|round(6) %}
        # Clear any set gcode offsets
        SET_GCODE_OFFSET X=0 Y=0 Z=0 MOVE=0
        {% if idxvars.debug_level|int > 0 %}
            RESPOND MSG="Home X - Toolhead 1 left active, activating Toolhead 0 for homing."
        {% endif %}
    {% endif %}
    # Set the LEDs if applicable.
    {% if idxvars.toolhead_led %}
        STATUS_HOMING
        SET_DUAL_CARRIAGE CARRIAGE=1
        STATUS_HOMING
        SET_DUAL_CARRIAGE CARRIAGE=0
    {% endif %}
    {% if idxvars.debug_level|int > 0 %}
        RESPOND MSG="Homing X"
    {% endif %}
    # Home the X and Dual Carriage axis.
    G28 X
    # Finish by parking T1 if homing to the left.
    {% if homing_left == "True" %}
        {% if idxvars.debug_level|int > 0 %}
            RESPOND MSG="Home X - Toolhead 1 homed left, parkling T1."
        {% endif %}
        # Set T1 active.
        SET_DUAL_CARRIAGE CARRIAGE=1
        ACTIVATE_EXTRUDER EXTRUDER=extruder1
        # Park T1
        _PARK_TOOL
        # Activate T0
        SET_DUAL_CARRIAGE CARRIAGE=0
        ACTIVATE_EXTRUDER EXTRUDER=extruder
    {% endif %}
    # Move T0 to the 0 position of the bed.
    G0 X0 F{idxvars.homing_feedrate}
    # Update the LEDs.
    {% if idxvars.toolhead_led %}
        STATUS_READY
        SET_DUAL_CARRIAGE CARRIAGE=1
        STATUS_READY
        SET_DUAL_CARRIAGE CARRIAGE=0
    {% endif %}
    # Update the Mainsail color for T0, as that is left as the active tool.
    SET_GCODE_VARIABLE MACRO=T1 VARIABLE=color VALUE="''"
    {% if printer["gcode_macro T2"] is defined %}
        SET_GCODE_VARIABLE MACRO=T2 VARIABLE=color VALUE="''"
    {% endif %}
    {% if printer["gcode_macro T3"] is defined %}
        SET_GCODE_VARIABLE MACRO=T3 VARIABLE=color VALUE="''"
    {% endif %}
    {% if printer["gcode_macro T4"] is defined %}
        SET_GCODE_VARIABLE MACRO=T4 VARIABLE=color VALUE="''"
    {% endif %}
    SET_GCODE_VARIABLE MACRO=T0 VARIABLE=color VALUE="'{idxvars.active_tool_color|string}'"
    # Set the previous z_offset.
    SET_GCODE_OFFSET X=0 Y=0 Z={prev_z_offset} MOVE=1
    # Set the spooler assist if AFC is on this toolhead.
    {% if printer.AFC is defined %}
        {% set btlane = printer["gcode_macro T0"].btlane|int %}
        {% if (btlane|int == 0) and (printer.AFC.current_load|string|upper != NULL)  %}
            SET_ESPOOLER_VALUES LANE={printer.AFC.current_load|string} ENABLE_ASSIST=0
        {% elif btlane|int > 0 %}
            SET_ESPOOLER_VALUES LANE=lane{btlane|string} ENABLE_ASSIST=1
        {% endif %}
    {% endif %}

#####################################################################
#  Conditional Homing Routine, home the printer if not already 
#####################################################################

[gcode_macro CHOME]
description: Homes and performs bed tilt only if these are not completed.
gcode:
    {% set idxvars = printer["gcode_macro IDEX_VARS"] %}
    # Home the printer.
    {% if "xyz" not in printer.toolhead.homed_axes %}
        G28
    {% else %}
        {% if idxvars.debug_level|int > 0 %}
            RESPOND MSG="Printer already homed, skipping homing."
        {% endif %}
    {% endif %}
    # Adjust the z_tilt if not done.
    {% if printer.z_tilt is defined %}
        {% if printer.z_tilt.applied == False %}
        Z_TILT_ADJUST
        {% else %}
            {% if idxvars.debug_level|int > 0 %}
                RESPOND MSG="Printer bed already adjusted, skipping Z_TILT_ADJUST."
            {% endif %}
        {% endif %}
    {% endif %}
    # Adjust QGL if not done
    {% if printer.quad_gantry_level is defined %}
        {% if printer.quad_gantry_level.applied == False %}
        QUAD_GANTRY_LEVEL
        {% else %}
            {% if idxvars.debug_level|int > 0 %}
                RESPOND MSG="Printer gantry already adjusted, skipping QGL."
            {% endif %}
        {% endif %}
    {% endif %}

#####################################################################
#  Z Tilt Adjust override
#####################################################################

[gcode_macro Z_TILT_ADJUST]
rename_existing: _Z_TILT_ADJUST
description: Override of Z_TILT_ADJUST.
gcode:
    {% if printer.z_tilt is defined %}
      {% set idxvars = printer["gcode_macro IDEX_VARS"] %}
      # If not homed, home the printer first.
      {% if "xyz" not in printer.toolhead.homed_axes %}
          {% if idxvars.debug_level|int > 0 %}
              RESPOND MSG="Printer not homed, forcing full home."
          {% endif %}
          G28
      {% endif %}
      # Make sure T0 is called for z_tilt.
      {% if printer.dual_carriage.carriage_0 == "INACTIVE" %}
        T0
      {% endif %}
      {% if idxvars.docking_probe %}
          # Using a dockable probe 
          _CheckProbe action=query
          _ATTACH_PROBE
      {% endif %}
      {% if idxvars.debug_level|int > 0 %}
          RESPOND MSG="Adjusting belt tilt."
      {% endif %}
      {% if idxvars.toolhead_led %}
          STATUS_LEVELING
      {% endif %}
      _Z_TILT_ADJUST
      # Re-home Z.
      G28 Z0
    {% else %}
      RESPOND MSG="Z_tilt not defined in printer.cfg, skipping Z_TILT_ADJUST"
    {% endif %}

