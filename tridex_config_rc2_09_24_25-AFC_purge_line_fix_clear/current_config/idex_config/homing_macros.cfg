#####################################################################
#  Bed Mesh Calibrate override for dockable probes 
#####################################################################

[gcode_macro BED_MESH_CALIBRATE]
rename_existing: _BED_MESH_CALIBRATE
description: Perform Mesh Bed Leveling with klicky automount
gcode:
    {% set idxvars = printer["gcode_macro IDEX_VARS"] %}
    {% if idxvars.docking_probe %}
        # Using a dockable probe 
        _CheckProbe action=query
        _ATTACH_PROBE
    {% endif %}
    # Run the bed mesh
    _BED_MESH_CALIBRATE {% for p in params %}{'%s=%s ' % (p, params[p])}{% endfor %}    
    {% if idxvars.docking_probe %}
        # Using a dockable probe 
        _DOCK_PROBE
    {% endif %}

#####################################################################
#####################################################################
#
#  Dockable probe macros.
#  These were pulled almost directly from the macros provided
#  in the original Tridex github.
#
#####################################################################
#####################################################################

#####################################################################
#   _ATTACH_PROBE
#   Attach the probe to the tool head.
#####################################################################

[gcode_macro _ATTACH_PROBE]
description: Attach the probe to the tool head.
gcode:
    {% set idxvars = printer["gcode_macro IDEX_VARS"] %}
    {% set dxvars = printer["gcode_macro DOCKABLE_PROBE"] %}
    {% if idxvars.docking_probe %}   
      # Check to see if the printer is homed.
      {% if "xyz" not in printer.toolhead.homed_axes %}
          {% if idxvars.debug_level|int > 1 %}
              RESPOND MSG="Cannot attach probe without X and Y homed."
          {% endif %}
          G28
      {% endif %}
      # Check for the active tool head, switch to T0 if not active
      {% if printer.dual_carriage.carriage_0 == "INACTIVE" %}
          {% if idxvars.debug_level|int > 1 %}
              RESPOND MSG="Changing tool to T0 for probe attachment."
          {% endif %}
          T0
      {% endif %}
      # Check to see if the probe is attached
      {% if dxvars.probe_attached == False and dxvars.probe_lock == False %}
          {% if idxvars.debug_level|int > 1 %}
              RESPOND MSG="Probe is not attached, moving to dock location."
          {% endif %}
          # Move to the dock location.
          G0 X{dxvars.docklocation_x} Y{dxvars.docklocation_y|float - dxvars.dockclear_y|float} F{idxvars.feedrate}
          {% if idxvars.debug_level|int > 1 %}
              RESPOND MSG="Attaching probe."
          {% endif %}
          # Attach the probe.
          G0 X{dxvars.docklocation_x} Y{dxvars.docklocation_y} F{dxvars.attach_speed}
          {% if idxvars.debug_level|int > 1 %}
              RESPOND MSG="Moving probe away from dock."
          {% endif %}
          # Move away from the dock, keeping the probe attached. 
          G0 X{dxvars.docklocation_x} Y{dxvars.docklocation_y|float - dxvars.dockclear_y|float} F{dxvars.attach_speed}
          # Check the probe, setting to attached if successful.
          _CHECKPROBE ACTION=attach
      # Check to see if the probe is locked.
      {% elif dxvars.probe_lock %}
          {% if idxvars.debug_level|int > 1 %}
              RESPOND MSG="Probe is locked, cannot attach."
          {% endif %}
          # Probe is locked, query the probe.
          _CHECKPROBE ACTION=query
      {% else %}
          {% if idxvars.debug_level|int > 1 %}
              RESPOND MSG="Probe is already attached."
          {% endif %}
          # Probe is already attached.
          _CHECKPROBE ACTION=query
      {% endif %}
    {% else %}
      RESPOND MSG="Dockable probe not configured in idex_variables.cfg"
    {% endif %}

#####################################################################
#   _DOCK_PROBE
#   Return the probe to the dock.
#####################################################################

[gcode_macro _DOCK_PROBE]
description: Return the probe to the dock.
gcode:
    {% set idxvars = printer["gcode_macro IDEX_VARS"] %}
    {% set dxvars = printer["gcode_macro DOCKABLE_PROBE"] %}
    {% if idxvars.docking_probe %}    
      # Check to see if the printer is homed.
      {% if "xyz" not in printer.toolhead.homed_axes %}
        {% if idxvars.debug_level|int > 1 %}
            RESPOND MSG="Cannot attach probe without X and Y homed."
        {% endif %}
        G28
      {% endif %}
      # Check for the active tool head, switch to T0 if not active
      {% if printer.dual_carriage.carriage_0 == "INACTIVE" %}
        {% if idxvars.debug_level|int > 1 %}
            RESPOND MSG="Changing tool to T0 for probe attachment."
        {% endif %}
        T0
      {% endif %}
      # Check to see if the probe is attached
      {% if dxvars.probe_attached and not dxvars.probe_lock %}
        {% if idxvars.debug_level|int > 1 %}
            RESPOND MSG="Probe is attached, moving to dock location."
        {% endif %}
        # Move to the dock location.
        G0 X{dxvars.docklocation_x} Y{dxvars.docklocation_y|float - dxvars.dockclear_y|float} F{idxvars.feedrate}
        {% if idxvars.debug_level|int > 1 %}
            RESPOND MSG="Docking probe."
        {% endif %}
        # Attach the probe.
        G0 X{dxvars.docklocation_x} Y{dxvars.docklocation_y} F{dxvars.attach_speed}
        {% if idxvars.debug_level|int > 1 %}
            RESPOND MSG="Moving toolhead away from dock."
        {% endif %}
        # Move away from the dock, keeping the probe attached. 
        G0 X{dxvars.docklocation_x|float + dxvars.dockclear_x|float} Y{dxvars.docklocation_y} F{dxvars.attach_speed}
        # Check the probe, setting to attached if successful.
        _CHECKPROBE ACTION=dock
      # Check to see if the probe is locked.
      {% elif dxvars.probe_lock %}
        {% if idxvars.debug_level|int > 1 %}
            RESPOND MSG="Probe is locked, cannot dock."
        {% endif %}
        # Probe is locked, query the probe.
        _CHECKPROBE ACTION=query
      {% else %}
        {% if idxvars.debug_level|int > 1 %}
            RESPOND MSG="Probe is already docked."
        {% endif %}
        # Probe is already docked.
        _CHECKPROBE ACTION=query
      {% endif %}
    {% else %}
      RESPOND MSG="Dockable probe not configured in idex_variables.cfg"
    {% endif %}

#####################################################################
#  Probe Accuracy
#####################################################################

[gcode_macro PROBE_ACCURACY]
rename_existing: _PROBE_ACCURACY
description: Probe Z-height accuracy
gcode:
    {% set idxvars = printer["gcode_macro IDEX_VARS"] %}
    {% set safe_x = (printer['configfile'].config["stepper_x"]["position_min"]|float + printer['configfile'].config["dual_carriage"]["position_max"]|float) / 2  %}
    {% set safe_y = printer['configfile'].config["stepper_y"]["position_max"]|float / 2  %}
    {% if not 'xyz' in printer.toolhead.homed_axes %}
        {% if idxvars.debug_level|int > 1 %}
            RESPOND MSG="Printer not home for PROBE_CALIBRATE. Homing now."
        {% endif %}
        G28
    {% endif %}

    # Move to a save Z height of 10 and approximate center of the bed.
    G0 X{safe_x} Y{safe_y} Z10 F{idxvars.homing_feedrate}
    M400

    {% if idxvars.docking_probe %}
      SAVE_GCODE_STATE NAME=_probe_cal_save_state
      _CHECKPROBE ACTION=query
      _ATTACH_PROBE
      RESTORE_GCODE_STATE NAME=_probe_cal_save_state MOVE=1
    {% endif %}
    _PROBE_ACCURACY {% for p in params
            %}{'%s=%s ' % (p, params[p])}{%
           endfor %}
    {% if idxvars.docking_probe %}
      SAVE_GCODE_STATE NAME=_probe_cal_save_state
      _DOCK_PROBE
      RESTORE_GCODE_STATE NAME=_probe_cal_save_state MOVE=1
    {% endif %}
    
#####################################################################
# check to see if probe is where it is supposed to be after
# attaching/docking maneuver and set homing error or shutdown
#####################################################################

[gcode_macro _CheckProbe]
variable_probe_state:           0
gcode:
    Query_Probe
    _SetProbeState action={ ACTION }

#####################################################################
# due to how templates are evaluated, we have query endstops in one
# macro and call another macro to make decisions based on the result
#####################################################################

[gcode_macro _SetProbeState]
gcode:
    {% set P = printer.probe.last_query %}

    # If triggered (true), probe not attached
    {% if P %}
        SET_GCODE_VARIABLE MACRO=DOCKABLE_PROBE VARIABLE=probe_attached VALUE={ False }
    # If not triggered (false), probe attached
    {% else %}
        SET_GCODE_VARIABLE MACRO=DOCKABLE_PROBE VARIABLE=probe_attached VALUE={ True }
    {% endif %}

    {% if params.ACTION == 'query' %}
          SET_GCODE_VARIABLE MACRO=DOCKABLE_PROBE VARIABLE=probe_state VALUE={ P }
    {% endif %}

    # if probe fails to attach/detach
    # if not docked
    {% if (not P and params.ACTION == 'dock') %}
        { action_raise_error("Probe dock failed!") }
    {% endif %}

    # if not attached
    {% if P and params.ACTION == 'attach' %}
        { action_raise_error("Probe attach failed!") }
    {% endif %}