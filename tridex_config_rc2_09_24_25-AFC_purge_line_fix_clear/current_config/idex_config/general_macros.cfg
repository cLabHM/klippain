#####################################################################
#   Client Variable 
#   - This overrides the park position in the mainsail.cfg PAUSE macro
#   !!! Required when using copy and mirror modes !!!
#   !!! Uncomment ONLY for Mainsail installation
#   for Fluidd, edit x_park and y_park in the pause macro in fluidd.cfg 
#   to a position T0 can reach and not crash T1 while in copy or mirror mode.    
#####################################################################

[gcode_macro _CLIENT_VARIABLE]
variable_use_custom_pos   : True  ; use custom park coordinates for x,y [True/False]
variable_custom_park_x    : 30    ; custom x position; value must be within your defined min and max of X
variable_custom_park_y    : 30    ; custom y position; value must be within your defined min and max of Y
variable_custom_park_dz   : 2.0   ; custom dz value; the value in mm to lift the nozzle when move to park position
variable_retract          : 1.0   ; the value to retract while PAUSE
variable_cancel_retract   : 5.0   ; the value to retract while CANCEL_PRINT
variable_speed_retract    : 35.0  ; retract speed in mm/s
variable_unretract        : 1.0   ; the value to unretract while RESUME
variable_speed_unretract  : 35.0  ; unretract speed in mm/s
variable_speed_hop        : 15.0  ; z move speed in mm/s
variable_speed_move       : 100.0 ; move speed in mm/s
variable_park_at_cancel   : True  ; allow to move the toolhead to park while execute CANCEL_PRINT [True/False]
variable_park_at_cancel_x : None  ; different park position during CANCEL_PRINT [None/Position as Float]; park_at_cancel must be True
variable_park_at_cancel_y : None  ; different park position during CANCEL_PRINT [None/Position as Float]; park_at_cancel must be True
gcode:

######################################################################################################################################################
#  FULL FEATURED PRUSA SLICER START GCODE:
#     This includes the following situations:
#     Only T0 used in a print
#     Only T1 used in a print
#     T0 AND T1 used in a print
#     BoxTurtle filaments are selected properly
#
######################################################################################################################################################
#       PRUSA SLICER PRINTER START GCODE with BoxTurtle installed on T1:
######################################################################################################################################################
#  This is the recommended start gcode for Prusa Slicer to enable all features in the print_start macro with a BoxTurtle connected to T1:
#
#   M190 S{bed_temperature[current_extruder]}
#   {if(is_extruder_used[0])}M104 S150 T0{endif}
#   {if(is_extruder_used[1] or is_extruder_used[2] or is_extruder_used[3] or is_extruder_used[4])}M104 S150 T1{endif}
#
#   SET_PRINT_STATS_INFO TOTAL_LAYER=[total_layer_count]
#   print_start print_mode="PRIMARY" t0_starting_temp={if(is_extruder_used[0])}{first_layer_temperature[0]}{else}0{endif} t1_starting_temp={if(is_extruder_used[1] or is_extruder_used[2] or is_extruder_used[3] or is_extruder_used[4])}{first_layer_temperature[1]}{else}0{endif} ooze_prev={ooze_prevention} initial_tool={initial_extruder} chamber_temp={chamber_minimal_temperature[current_extruder]}
#
######################################################################################################################################################
#       PRUSA SLICER PRINTER START GCODE without BoxTurtle:
######################################################################################################################################################
#
#   M190 S{bed_temperature[current_extruder]}
#   {if(is_extruder_used[0])}M104 S150 T0{endif}
#   {if(is_extruder_used[1])}M104 S150 T1{endif}
#
#   SET_PRINT_STATS_INFO TOTAL_LAYER=[total_layer_count]
#   print_start print_mode="PRIMARY" t0_starting_temp={if(is_extruder_used[0])}{first_layer_temperature[0]}{else}0{endif} t1_starting_temp={if(is_extruder_used[1])}{first_layer_temperature[1]}{else}0{endif} ooze_prev={ooze_prevention} initial_tool={initial_extruder} chamber_temp={chamber_minimal_temperature[current_extruder]}
#
######################################################################################################################################################
#       ORCA SLICER PRINTER START GCODE:
######################################################################################################################################################
#
#  M190 S{bed_temperature[current_extruder]}
#  {if(is_extruder_used[0])}M104 S150 T0{endif}
#  {if(is_extruder_used[1])}M104 S150 T1{endif}
#
#  print_start print_mode="PRIMARY" t0_starting_temp={if(is_extruder_used[0])}{first_layer_temperature[0]}{else}0{endif} t1_starting_temp={if(is_extruder_used[1])}{first_layer_temperature[1]}{else}0{endif} ooze_prev={ooze_prevention} initial_tool={initial_extruder} chamber_temp={chamber_temperature[initial_extruder]}
#
######################################################################################################################################################
#
#  To have the ability to use different filaments when using COPY mode use the following in your start gcdode in Prusa Slicer: 
#  ; M190 S0
#  ; M109 S0 ; uncomment to remove set&wait temp gcode added automatically after this start gcode
#  print_start print_mode="COPY" t1_starting_temp={first_layer_temperature[1]} t0_printing_temp={temperature[0]} t1_printing_temp={temperature[1]}
#
#  To have the ability to use different filaments when using MIRROR mode use the following in your start gcdode in Prusa Slicer: 
#  ; M190 S0
#  ; M109 S0 ; uncomment to remove set&wait temp gcode added automatically after this start gcode
#  print_start print_mode="MIRROR" t1_starting_temp={first_layer_temperature[1]} t0_printing_temp={temperature[0]} t1_printing_temp={temperature[1]}
######################################################################################################################################################

######################################################################################################################################################
#  Print Start Routine
###   Feel free to edit how you choose, this is the framework that works with minimal slicer configuration
######################################################################################################################################################

[gcode_macro PRINT_START]
gcode:
    # The slicer has already sent the commands to heat up the bed and extruders,
    # here we grab the extruder set temperatures to be used to figure out what we need to purge.
    {% set t0_start_temp = params.T0_STARTING_TEMP|default(0)|int %}
    {% set t1_start_temp = params.T1_STARTING_TEMP|default(0)|int %}

    # Setup copy / mirror temperatures from parameters if present.
    {% set t0_first_layer = params.T0_STARTING_TEMP|default(0)|int %}
    {% set t0_start_temp_copy_mirror = t0_first_layer|int %}
    {% set t1_start_temp_copy_mirror = params.T1_STARTING_TEMP|default(0)|int %}
    {% set t0_print_temp_copy_mirror = params.T0_PRINTING_TEMP|default(0)|int %}
    {% set t1_print_temp_copy_mirror = params.T1_PRINTING_TEMP|default(0)|int %}
    
    # Assign parameters set from the slicer
    {% set print_mode = params.PRINT_MODE|upper|default("PRIMARY") %}
    {% set ooze_prev = params.OOZE_PREV|upper|default("FALSE") %}
    {% set initial_tool = params.INITIAL_TOOL|default(0)|int %}
    {% set chamber_temp = params.CHAMBER_TEMP|default(0)|int %}

    # Setup access for other printer variables
    {% set idxvars = printer["gcode_macro IDEX_VARS"] %}
    {% set svv = printer.save_variables.variables %}

    _SET_TOOL_CHANGE_OPTIONS OOZE={ooze_prev}

    # Head off hot end temperatures so they are not at full temp while homing and bed meshing.
    # Prevents oozing and such.
    {% if t1_start_temp > 0 %}
      {% if (initial_tool|int == 0) and (t0_start_temp|int < 150) %}
          ## T1 was left active and Klipper thinks we want to use it for a T0 only print.
          # First Set T0 start temp to T1 start temp
          {% set t0_start_temp = t1_start_temp %}
          # Clear T1 start temp
          {% set t1_start_temp = 0 %}
          # Shutdown T1 heater
          M104 S{t1_start_temp} T1
      {% else %}
          M104 S150 T1
      {% endif %}
    {% endif %}
    # Set T0 to 150 for probing and bed mesh. T0 is always the probing tool head.
    SET_HEATER_TEMPERATURE HEATER=extruder TARGET=150
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM=150

    # Clear any copy or mirror modes from previous prints
    {% if printer.dual_carriage.carriage_1 == "COPY" or printer.dual_carriage.carriage_1 == "MIRROR" %}
        SET_DUAL_CARRIAGE CARRIAGE=1 MODE=PRIMARY
        SYNC_EXTRUDER_MOTION EXTRUDER=extruder1 MOTION_QUEUE=extruder1
        {% if printer.toolhead.homed_axes == "xyz" %}
            # Re-home X no matter what to reset the tool head positions
            G28 X
        {% endif %}
    {% endif %}

    # If the last print left T1 active re-home X to reset positions and active tool head
    {% if printer.dual_carriage.carriage_0 == "INACTIVE" %}
        {% if printer.toolhead.homed_axes == "xyz" %}
            G28 X
        {% endif %}
    {% endif %}

    # If the user sent over chamber temperature value from the slicer
    {% if printer["temperature_sensor chamber"] is defined %}
        {% if chamber_temp > 0 %}
            # Save the current bed target temp
            {% set bed_temp = printer.heater_bed.target|int %}
            {% set new_bed_temp = printer.configfile.config.heater_bed.max_temp|int - 5 %}
            # Heat up the bed to 5 degrees under max temp
            M140 S{new_bed_temp}
            RESPOND MSG="Waiting for chamber temperature of {chamber_temp}"
            # Wait for the chamber temp to reach desired level
            Temperature_wait sensor="temperature_sensor chamber" minimum={chamber_temp}
            # Return the bed to desired temperature
            M190 S{bed_temp}
        {% endif %}
    {% endif %}
    
    # Check to see if homing and z_tilt has been done
    CHOME

    # Set our print mode, perform additional pre-printing functions if required.
    {% if print_mode == "PRIMARY" %}
        M605 S1 # Set to primary with auto-park
        {% if idxvars.toolhead_led %}
            STATUS_MESHING
        {% endif %}
        # Run a bed mesh
        BED_MESH_CALIBRATE ADAPTIVE=1
    {% endif %}

    # If we are doing a copy / mirror modes then we set the variables for the temperatures.
    {% if (print_mode) == "COPY" or (print_mode) == "MIRROR" %}
        # Set T1 starting temperature from the parameter.
        {% set t1_start_temp = t1_start_temp_copy_mirror %}
        # Check and make sure compatable g-code has been loaded.
        {% if t0_start_temp <= 160 %}
            RESPOND TYPE=error MSG="*** ERROR *** ERROR *** ERROR ***"
            RESPOND TYPE=error MSG="T1 print file detected, COPY and MIRROR modes must be based on T0 gcode...."
            RESPOND TYPE=error MSG="*** ERROR *** ERROR *** ERROR ***"
            # Set the extruders start temps to 0
            {% set t0_start_temp = 0 %}
            {% set t1_start_temp = 0 %}
            # Shutdown the heaters
            M104 S0 T0
            M104 S0 T1
            M140 S0
            # Reset print_mode to primary
            {% set print_mode = "PRIMARY" %}
            # Shut off the motors
            M83
        {% else %}
            # Update the idxvars macro values with the printing temperature values for both extruders.
            SET_GCODE_VARIABLE MACRO=IDEX_VARS VARIABLE=t0_copy_mirror_temp_start VALUE={t0_start_temp_copy_mirror}
            SET_GCODE_VARIABLE MACRO=IDEX_VARS VARIABLE=t1_copy_mirror_temp_start VALUE={t1_start_temp_copy_mirror}
            SET_GCODE_VARIABLE MACRO=IDEX_VARS VARIABLE=t0_copy_mirror_temp_print VALUE={t0_print_temp_copy_mirror}
            SET_GCODE_VARIABLE MACRO=IDEX_VARS VARIABLE=t1_copy_mirror_temp_print VALUE={t1_print_temp_copy_mirror}
            # Clear any saved bed mesh, then finish the printer config for the selected mode
            BED_MESH_CLEAR
        {% endif %}
    {% endif %}

    # Set the offsets for the print, only done in a primary mode print that uses BOTH tool heads.
    {% if idxvars.set_offset_at_print_start %}
        {% if t0_start_temp > 160 and t1_start_temp > 160 %}
            {% if print_mode == "PRIMARY" %}
                IDEX_FIND_TOOL_OFFSETS
            {% endif %}
        {% endif %}
    {% endif %}

    # Park T0, preparing for heat up
    _PARK_TOOL

    # Heat up the hot ends used in the print.
    # If T0 is used, begin the heat up.
    {% if t0_start_temp > 160 %}
        {% if idxvars.toolhead_led %}
            STATUS_HEATING
        {% endif %}
        {% if idxvars.debug_level|int > 1 %}
          RESPOND MSG="Heating T0 to printing temp: {t0_first_layer}."
        {% endif %}
        M104 S{t0_first_layer} T0
    {% else %}
        {% if idxvars.debug_level|int > 1 %}
          RESPOND MSG="T0 not used this print, setting heater to off."
        {% endif %}
        M104 S0 T0
    {% endif %}
    # If T1 is used heat it up to printing temp.
    {% if t1_start_temp > 160 %}
        SET_DUAL_CARRIAGE CARRIAGE=1 MODE=PRIMARY
        ACTIVATE_EXTRUDER EXTRUDER=extruder1
        {% if idxvars.toolhead_led %}
            STATUS_HEATING
        {% endif %}
        {% if idxvars.debug_level|int > 1 %}
          RESPOND MSG="Heating T1 to printing temp: {t1_start_temp_copy_mirror}."
        {% endif %}
        M109 S{t1_start_temp_copy_mirror} T1
        {% if idxvars.toolhead_led %}
            STATUS_READY
        {% endif %}
        SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
        ACTIVATE_EXTRUDER EXTRUDER=extruder
    {% else %}
        {% if idxvars.debug_level|int > 1 %}
          RESPOND MSG="T1 not used this print, setting heater to off."
        {% endif %}
        M104 S0 T1
    {% endif %}
    # Insure T0 is fully heated to printing temp.
    {% if t0_start_temp > 160 %}
        M109 S{t0_first_layer} T0
        {% if idxvars.toolhead_led %}
            STATUS_READY
        {% endif %}
    {% endif %}
    # Setup our print mode in preparation for purging.
    {% if (print_mode) == "COPY" %}
         # Call M605 to setup copy mode
        M605 S2
    {% elif (print_mode) == "MIRROR" %}
        # Call M605 to setup mirror mode.
        M605 S3
    {% endif %}

    # Grab any tweaked z_offset the user had previously set.
    # T0 will be active by this point so we do not have to mess with subtracting T1 z_offset.
    {% set tweaked_z_offset = printer.gcode_move.homing_origin.z|float|round(3) %}
    {% if idxvars.debug_level|int > 1 %}
      RESPOND MSG="Preparing printer for purging macros"
      RESPOND MSG="T0 start = {t0_start_temp} : T1 start = {t1_start_temp}"
      RESPOND MSG="Print mode = {print_mode} : Initial tool = {initial_tool}"
    {% endif %}
    _PREPARE_PRINTER_FOR_PURGE T0_START_T={t0_start_temp} T1_START_T={t1_start_temp} P_MODE={print_mode} I_TOOL={initial_tool} TWEAKED_Z={tweaked_z_offset}

    # Reset temps if using ooze prevention.
    {% if ooze_prev =="TRUE" %}
        M104 S{t0_start_temp} T0
        M104 S{t1_start_temp} T1
        # Prusa Slicer is going to put an M109 in after print_start, park the active tool head so we don't get oozing.
        _PARK_TOOL
    {% endif %}

#####################################################################
#   _SET_TOOL_CHANGE_OPTIONS
#####################################################################

[gcode_macro _SET_TOOL_CHANGE_OPTIONS]
description: Sets the tool change options at the beginning of a print
gcode:
    {% set idxvars = printer["gcode_macro IDEX_VARS"] %}
    {% set svv = printer.save_variables.variables %}
    {% set m_ooze = params.OOZE|upper %}
    # If ooze prevention is used then we need to set the tool change method properly,
    # otherwise the tool head will heat back up on top of our print.
    {% if m_ooze == "TRUE" %}
      SET_GCODE_VARIABLE MACRO=IDEX_VARS VARIABLE=swap_toolheads VALUE=0
      SET_GCODE_VARIABLE MACRO=IDEX_VARS VARIABLE=immediate_move VALUE=0
    {% else %}
    # If ooze prevention is NOT used, lets make sure that the tool change method matches what the user wants.
    # Just in case the last print used ooze prevention.
      {% set tool_change = svv.preferred_tool_change|upper %}
      {% if tool_change == "SWAP" %}
        SET_GCODE_VARIABLE MACRO=IDEX_VARS VARIABLE=swap_toolheads VALUE=1
        SET_GCODE_VARIABLE MACRO=IDEX_VARS VARIABLE=immediate_move VALUE=1
      {% elif tool_change == "OOZE_PREV" %}
        SET_GCODE_VARIABLE MACRO=IDEX_VARS VARIABLE=swap_toolheads VALUE=0
        SET_GCODE_VARIABLE MACRO=IDEX_VARS VARIABLE=immediate_move VALUE=0
      {% else %}
        # Classic Tridex tool change catches all other entries.
        SET_GCODE_VARIABLE MACRO=IDEX_VARS VARIABLE=swap_toolheads VALUE=0
        SET_GCODE_VARIABLE MACRO=IDEX_VARS VARIABLE=immediate_move VALUE=1
      {% endif %}
    {% endif %}

#####################################################################
#   _PREPARE_PRINTER_FOR_PURGE
#####################################################################

[gcode_macro _PREPARE_PRINTER_FOR_PURGE]
description: Prepares the tool heads for purging and calls the purge macro.
gcode:
    {% set idxvars = printer["gcode_macro IDEX_VARS"] %}
    {% set t0_start_temp = params.T0_START_T|int %}
    {% set t1_start_temp = params.T1_START_T|int %}
    {% set print_mode = params.P_MODE|upper %}
    {% set initial_tool = params.I_TOOL|int %}
    {% set tweaked_z_offset = params.TWEAKED_Z %}

    # If T0 is used in the print.
    {% if t0_start_temp > 160 %}
        # If we are using copy or mirror modes.
        {% if (print_mode == "COPY") or (print_mode =="MIRROR") %}
          {% if idxvars.debug_level|int > 1 %}
            RESPOND MSG="Purging tool heads for COPY or MIRROR mode."
          {% endif %}
            PURGE_TOOL T=0
        {% endif %}
        # If T1 is not used.
        {% if t1_start_temp < 160 %}
            {% if idxvars.toolhead_led %}
                STATUS_PRINTING
            {% endif %}
            {% if idxvars.debug_level|int > 1 %}
              RESPOND MSG="Purging tool head for T0 only print."
            {% endif %}
            PURGE_TOOL T=0
            {% if idxvars.debug_level|int > 1 %}
                RESPOND MSG="Toolhead T0 purged, starting print."
            {% endif %}
        {% endif %}
        # IF T0 and T1 are used in the print
        {% if (t1_start_temp > 160) and (print_mode == "PRIMARY") %}
            # If the z offset is 0 - most likely set via hardware. Purge both of the extruders at the same time.
            {% if (printer.AFC is defined == False) and (idxvars.offset_z|abs|float|round(3) <= 0.050) %}
                {% if idxvars.offset_z|abs|float|round(3) <= 0.050 %}
                    {% if idxvars.toolhead_led %}
                        SET_DUAL_CARRIAGE CARRIAGE=1 MODE=PRIMARY
                        ACTIVATE_EXTRUDER EXTRUDER=extruder1
                        STATUS_PRINTING
                        SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
                        ACTIVATE_EXTRUDER EXTRUDER=extruder
                        STATUS_PRINTING
                    {% endif %}
                    # Setup dual purging.
                    SET_DUAL_CARRIAGE CARRIAGE=1 MODE=MIRROR
                    SYNC_EXTRUDER_MOTION EXTRUDER=extruder1 MOTION_QUEUE=extruder
                    # Purge the tools.
                    {% if idxvars.debug_level|int > 1 %}
                    RESPOND MSG="Purging both tool heads for dual extrusion print."
                    {% endif %}
                    PURGE_TOOL T=0
                    # Reset to primary mode.
                    SET_DUAL_CARRIAGE CARRIAGE=1 MODE=PRIMARY
                    SYNC_EXTRUDER_MOTION EXTRUDER=extruder1 MOTION_QUEUE=extruder1
                    # Activate initial extruder, park the other one.
                    {% if initial_tool == 0 %}
                        # Make sure T1 is parked.
                        SET_DUAL_CARRIAGE CARRIAGE=1
                        ACTIVATE_EXTRUDER EXTRUDER=extruder1
                        {% if idxvars.toolhead_led %}
                            STATUS_READY
                        {% endif %}
                        {% if idxvars.debug_level|int > 1 %}
                        RESPOND MSG="T0 first tool used, parking T1."
                        {% endif %}
                        _PARK_TOOL
                        # Activate T0.
                        SET_DUAL_CARRIAGE CARRIAGE=0
                        ACTIVATE_EXTRUDER EXTRUDER=extruder
                        SET_GCODE_OFFSET X=0 Y=0 Z={tweaked_z_offset} MOVE=1
                    {% else %}
                        # Make sure T0 is parked.
                        SET_DUAL_CARRIAGE CARRIAGE=0
                        ACTIVATE_EXTRUDER EXTRUDER=extruder
                        {% if idxvars.toolhead_led %}
                            STATUS_READY
                        {% endif %}
                        {% if idxvars.debug_level|int > 1 %}
                        RESPOND MSG="T1 first tool used, parking T0."
                        {% endif %}
                        _PARK_TOOL
                        # Activate T1.
                        SET_DUAL_CARRIAGE CARRIAGE=1
                        ACTIVATE_EXTRUDER EXTRUDER=extruder1
                        SET_GCODE_OFFSET X={idxvars.offset_x} Y={idxvars.offset_y} Z={tweaked_z_offset|float + idxvars.offset_z|float|round(6)} MOVE=0
                    {% endif %}
                {% endif %}
            {% else %}
                # Software z offset is set, purge the nozzles one at a time so first printing is last purged.
                {% if initial_tool == 0 %}
                    # Activate T1 and set the offsets.
                    SET_DUAL_CARRIAGE CARRIAGE=1
                    ACTIVATE_EXTRUDER EXTRUDER=extruder1
                    SET_GCODE_OFFSET X={idxvars.offset_x} Y={idxvars.offset_y} Z={tweaked_z_offset|float + idxvars.offset_z|round(6)} MOVE=0
                    {% if idxvars.toolhead_led %}
                        STATUS_PRINTING
                    {% endif %}
                    # Purge T1, scrub the nozzle and park.
                    {% if idxvars.debug_level|int > 1 %}
                    RESPOND MSG="Purging T1 for dual extrusion print."
                    {% endif %}
                    PURGE_TOOL T=1
                    _NOZZLE_SCRUB
                    {% if idxvars.toolhead_led %}
                        STATUS_READY
                    {% endif %}
                    {% if idxvars.debug_level|int > 1 %}
                    RESPOND MSG="T0 first tool used, parking T1."
                    {% endif %}
                    _PARK_TOOL
                    # Activate T0 and re-set the offsets.
                    SET_DUAL_CARRIAGE CARRIAGE=0
                    ACTIVATE_EXTRUDER EXTRUDER=extruder
                    SET_GCODE_OFFSET X=0 Y=0 Z={tweaked_z_offset|float|round(3)} MOVE=1
                    {% if idxvars.toolhead_led %}
                        STATUS_PRINTING
                    {% endif %}
                    {% if idxvars.debug_level|int > 1 %}
                    RESPOND MSG="Purging T0 for dual extrusion print."
                    {% endif %}
                    # Purge T0 and start printing.
                    PURGE_TOOL T=0
                    {% if idxvars.debug_level|int > 1 %}
                    RESPOND MSG="Both toolheads purged, starting print."
                    {% endif %}
                {% else %}
                    # Activate T0 and re-set the offsets.
                    SET_DUAL_CARRIAGE CARRIAGE=0
                    ACTIVATE_EXTRUDER EXTRUDER=extruder
                    SET_GCODE_OFFSET X=0 Y=0 Z={tweaked_z_offset|float|round(3)} MOVE=1
                    # Purge T0, scrub the nozzle and park.
                    {% if idxvars.toolhead_led %}
                        STATUS_PRINTING
                    {% endif %}
                    {% if idxvars.debug_level|int > 1 %}
                    RESPOND MSG="Purging T0 for dual extrusion print."
                    {% endif %}
                    PURGE_TOOL T=0
                    _NOZZLE_SCRUB
                    {% if idxvars.toolhead_led %}
                        STATUS_READY
                    {% endif %}
                    {% if idxvars.debug_level|int > 1 %}
                    RESPOND MSG="T1 first tool used, parking T0."
                    {% endif %}
                    _PARK_TOOL
                    # Activate T1 and set the offsets.
                    SET_DUAL_CARRIAGE CARRIAGE=1
                    ACTIVATE_EXTRUDER EXTRUDER=extruder1
                    SET_GCODE_OFFSET X={idxvars.offset_x} Y={idxvars.offset_y} Z={tweaked_z_offset|float + idxvars.offset_z|float|round(3)} MOVE=0
                    {% if idxvars.toolhead_led %}
                        STATUS_PRINTING
                    {% endif %}
                    {% if idxvars.debug_level|int > 1 %}
                    RESPOND MSG="Purging T1 for dual extrusion print."
                    {% endif %}
                    # Purge T1 tool and start printing.
                    PURGE_TOOL T=1
                    {% if idxvars.debug_level|int > 1 %}
                    RESPOND MSG="Both toolheads purged, starting print."
                    {% endif %}
                {% endif %}
            {% endif %}
        {% endif %}
    {% endif %}
    # If T0 is not used and T1 is used.
    {% if (t0_start_temp < 160) and (t1_start_temp > 160) %}
        SET_DUAL_CARRIAGE CARRIAGE=1
        ACTIVATE_EXTRUDER EXTRUDER=extruder1
        SET_GCODE_OFFSET X={idxvars.offset_x} Y={idxvars.offset_y} Z={tweaked_z_offset|float + idxvars.offset_z|float|round(3)} MOVE=0
        
        {% if idxvars.toolhead_led %}
            STATUS_PRINTING
        {% endif %}
        {% if idxvars.debug_level|int > 1 %}
          RESPOND MSG="Purging tool head for T1 only print."
        {% endif %}
        PURGE_TOOL T=1
        #M104 S0 T0
        {% if idxvars.debug_level|int > 1 %}
            RESPOND MSG="Toolhead T1 purged, starting print."
        {% endif %}
    {% endif %}

#####################################################################
#  Purge Macro: edit to your preferences
#  Call with PURGE_TOOL T={tool number to purge}
#####################################################################

[gcode_macro PURGE_TOOL]
description: Purges active tool head at the front of the bed.
gcode:
    {% set head = params.T|default(0)|int %}
    {% set t1_prime_start = printer.configfile.config.stepper_x.position_min|float + printer.configfile.config.dual_carriage.position_max|float - 5 %}
    {% set idxvars = printer["gcode_macro IDEX_VARS"] %}
    # The tool head to be purged is expected to be active and at temperature
    G90                             ; use absolute coordinates.
    G92 E0                          ; reset extrusion length.
    G1 Y3 Z0.2 F12000               ; move to Y3 to start purge lines.
    {% if head == 0 %}
        G1 X5 F12000
        G1 X65 E10 F1000
        G1 Y5
        G1 X5 E10 F1000
        {% if idxvars.debug_level > 1 %}
            RESPOND MSG="T0 purge finished"
        {% endif %}
    {% else %}
        G1 X{t1_prime_start} F12000
        G1 X{t1_prime_start - 60} E10 F1000
        G1 Y5
        G1 X{t1_prime_start} E10 F1000
        {% if idxvars.debug_level > 1 %}
            RESPOND MSG="T1 purge finished"
        {% endif %}        
    {% endif %}
    G1 Z5                           ; Raise the Z height.
    G92 E0                          ; reset extrusion length.

#####################################################################
#  Print End
#####################################################################

[gcode_macro PRINT_END]
description: End of print macro.
gcode:
    {% set y_park = printer.configfile.config.stepper_y.position_max|float - 25 %}
    {% set z_safe = printer.configfile.config.stepper_z.position_max|int - printer.gcode_move.position.z|int %}
    {% set idxvars = printer["gcode_macro IDEX_VARS"] %}
    M400                                               ; wait for buffer to clear
    G92 E0                                             ; zero the extruder
    G0 E-5.0 F3600                                     ; retract 5mm
    G0 Y{y_park} F{idxvars.homing_feedrate}            ; park gantry at rear
    T0
    _PARK_TOOL                                         ; park active tool head
    TURN_OFF_HEATERS                                   ; turn off all heaters
    M106 S0 P0                                         ; turn off T0 part fan
    M106 S0 P1                                         ; turn off T1 part fan
    {% if (z_safe) > 10 %}                             ; Check to see if it is safe to move the bed down 10mm
      G91                                              ; Relative positioning
      G0 Z10 F3000                                     ; Move bed if it is safe to do so
      G90                                              ; Absolute positioning
    {% endif %}
    M84

#####################################################################
#  Printer Sleep - Shuts downs motors, fans and lights
#####################################################################

[gcode_macro PRINTER_SLEEP]
description: Shutdown all lights, heaters, and motors for the printer.
gcode:
    {% set idxvars = printer["gcode_macro IDEX_VARS"] %}
    # Shutdown the tool head LEDs.
    {% if idxvars.toolhead_led %}
        SET_DUAL_CARRIAGE CARRIAGE=1
        SET_LOGO_LEDS_OFF
        SET_NOZZLE_LEDS_OFF
        SET_DUAL_CARRIAGE CARRIAGE=0
        SET_LOGO_LEDS_OFF
        SET_NOZZLE_LEDS_OFF
    {% endif %}
    # Shut off chamber LEDs.
    {% if printer["led chamber_lighting"] is defined %}
        SET_LED LED=chamber_lighting WHITE=0.00 SYNC=0 TRANSMIT=1
    {% endif %}
    # Shut off bed logo LEDs.
    {% if printer["neopixel bed_logo"] is defined %}
        SET_LED LED=bed_logo RED=0.0 BLUE=0.0 GREEN=0.0 WHITE=0.0 TRANSMIT=1
    {% endif %}
    {% if printer["neopixel bt_logo"] is defined %}
        SET_LED LED=bt_logo RED=0.0 BLUE=0.0 GREEN=0.0 TRANSMIT=1
    {% endif %}
    {% if printer["neopixel corner_1"] is defined %}
        SET_LED LED=corner_1 RED=0.0 BLUE=0.0 GREEN=0.0 WHITE=0.0 TRANSMIT=1
    {% endif %}
    {% if printer["neopixel corner_2"] is defined %}
        SET_LED LED=corner_2 RED=0.0 BLUE=0.0 GREEN=0.0 WHITE=0.0 TRANSMIT=1
    {% endif %}
    {% if printer["AFC_led AFC_Indicator"] is defined %}
        SET_LED LED=AFC_Indicator RED=0.0 BLUE=0.0 GREEN=0.0 WHITE=0.0 TRANSMIT=1
    {% endif %}
    # Turn off motors.
    M84
    # Turn off fans.
    M107
    # Turn off bed heater.
    M140 S0
    # Turn off the extruder heaters.
    M104 S0 T0
    M104 S0 T1

#####################################################################
#  M601 - add support for Prusa Slicer pause at layer
#####################################################################

[gcode_macro M601]
description: Add M601 catch from the slicer to pause the print.
gcode: 
    RESPOND TYPE=echo MSG="Do the thing you paused the print for."
    PAUSE