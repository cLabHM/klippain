# This file contains common pin mappings for the BigTreeTech EBB36 V1.2
# when setup for T1 on Tridex

## See https://canbus.esoterical.online/ for CAN bus setup

## *** THINGS TO CHANGE/CHECK: ***
## CAN bus UUID                         [mcu] section
## Extruder rotation distance           [extruder1] section
## Thermistor type                      [extruder1] section - See https://www.klipper3d.org/Config_Reference.html#common-thermistors for common thermistor types
## Fan sections                         [fan_generic] [heater_fan]
## Tool head LEDs                       [neopixel] section
## Filament runout switch               [filament_switch_sensor]

##--------------------------------------------------------------------
## !!! Lines between the dashed lines need to be looked at and configured !!!
##--------------------------------------------------------------------

#####################################################################
#   Toolboard MCU
#####################################################################

[mcu toolboard_1]
##--------------------------------------------------------------------
canbus_uuid: my_toolboard_uuid
##--------------------------------------------------------------------

#####################################################################
#   Extruder
#####################################################################

[extruder1]
step_pin: toolboard_1: PD0
dir_pin: !toolboard_1: PD1
enable_pin: !toolboard_1: PD2
##  Update value below when you perform extruder calibration
##  If you ask for 100mm of filament, but in reality it is 98mm:
##  rotation_distance = <previous_rotation_distance> * <actual_extrude_distance> / 100
##  22.678 is a good starting point for CW2
##  gear_ratio: 50:10 for CW2
##  Current Extruder: G2SA
##--------------------------------------------------------------------
rotation_distance: 45.685
gear_ratio: 9:1
##--------------------------------------------------------------------

microsteps: 16
full_steps_per_rotation: 200
nozzle_diameter: 0.40
filament_diameter: 1.75

max_extrude_cross_section: 1.75
max_extrude_only_distance: 150.0

#####################################################################
#   Heater
#####################################################################

heater_pin: toolboard_1: PB13
sensor_type: ATC Semitec 104NT-4-R025H42G
sensor_pin: toolboard_1: PA3
min_temp: 0
max_temp: 300
max_power: 1.0

min_extrude_temp: 195

##--------------------------------------------------------------------
## Pressure Advance
pressure_advance: 0.042             # Try to keep pressure_advance below 1.0
pressure_advance_smooth_time: 0.040 # Default is 0.040
##--------------------------------------------------------------------

##  Make sure to update below for your relevant driver (2208 or 2209)
[tmc2209 extruder1]
uart_pin: toolboard_1: PA15
interpolate: false
run_current: 0.60
sense_resistor: 0.110
stealthchop_threshold: 0

#####################################################################
#   Fan Control
#####################################################################

[fan_generic print_cooling_t1]
##  Print Cooling Fan
pin: toolboard_1: PA0
kick_start_time: 0.5
off_below: 0.10

## Hotend fan
[heater_fan extruder1_fan]
Pin: toolboard_1: PA1
max_power: 1.0
kick_start_time: 0.5
heater: extruder1
heater_temp: 50.0
##  If you are experiencing back flow, you can reduce fan_speed
fan_speed: 1.0
#tachometer_pin: ^toolboard_1: PB9
#tachometer_ppr: 2
#   When tachometer_pin is specified, this is the number of pulses per
#   revolution of the tachometer signal. For a BLDC fan this is
#   normally half the number of poles. The default is 2.
# achometer_poll_interval: 0.0008

#####################################################################
#   Toolhead 1 LEDs
#####################################################################

# [neopixel th_leds_t1]
# pin: toolboard_1: PD3
# #   The pin connected to the neopixel. This parameter must be provided.
# chain_count: 3
# #   The number of Neopixel chips that are "daisy chained" to the
# #   provided pin. The default is 1 (which indicates only a single
# #   Neopixel is connected to the pin).
# color_order: GRBW
# #   Set the pixel order required by the LED hardware. Options are GRB,
# #   RGB, GRBW, or RGBW. The default is GRB.
# initial_RED: 1.0
# initial_GREEN: 0.0
# initial_BLUE: 1.0
# initial_WHITE: 0.0
# #   Sets the initial LED color of the Neopixel. Each value should be
# #   between 0.0 and 1.0. The WHITE option is only available on RGBW
# #   LEDs. The default for each color is 0.#

#####################################################################
#   Toolhead 1 Filament runout switches
#####################################################################

# [filament_switch_sensor T1_Filament_Pre_Extruder]
# pause_on_runout: False
# runout_gcode: 
# insert_gcode: 
# switch_pin: toolboard_1:PB8

#####################################################################
#   Accelerometer
#####################################################################
#
[adxl345 toolboard_1]
cs_pin: toolboard_1: PB12
spi_software_sclk_pin: toolboard_1: PB10
spi_software_mosi_pin: toolboard_1: PB11
spi_software_miso_pin: toolboard_1: PB2
axes_map: z,y,x