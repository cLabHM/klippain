#####################################################################
#   Bed Mesh
#####################################################################

[bed_mesh]
speed: 200
horizontal_move_z: 10
mesh_min: 30, 30
mesh_max: 270, 265
probe_count: 5,5
algorithm: bicubic
fade_start: 0.6
fade_end: 10.0
zero_reference_position: 150, 150

