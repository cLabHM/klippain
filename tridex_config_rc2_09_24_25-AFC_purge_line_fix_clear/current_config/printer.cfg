#####################################################################
#   Fan Control
#####################################################################

[controller_fan controller_fan0]
##  Controller fan
pin: PD14
max_power: 0.5
kick_start_time: 0.5
heater: heater_bed

[controller_fan controller_fan1]
##  Controller fan
pin: PD15
max_power: 0.5
kick_start_time: 0.5
heater: heater_bed

