# This file contains common pin mappings for the BigTreeTech Octopus V1.1
# To use this config, the firmware should be compiled for the STM32F446 with a "32KiB bootloader"
# Enable "extra low-level configuration options" and select the "12MHz crystal" as clock reference

# after running "make", move the file with:
#       mv ~/klipper/out/klipper.bin ~/printer_data/config/firmware.bin
# download via Mainsails and copy to an SD card to flash.

# See docs/Config_Reference.md for a description of parameters.

## FrankenVoron / DOOM / Voron Design Tridex 250/300/350mm BigTreeTech OctoPus V1.1 TMC2209 UART

## *** THINGS TO CHANGE/CHECK: ***
## MCU paths / CAN bus UUID's           [mcu] section
## Thermistor type                      [heater_bed] section - See https://www.klipper3d.org/Config_Reference.html#common-thermistors for common thermistor types
## Leadscrew Rotation Distance          [stepper_z], [stepper_z1], [stepper_z2]
## Z Endstop Switch location            idex_variables.cfg [gcode IDEX_VARS] section
## Z Endstop Switch  offset for Z0      [stepper_z] section
## PID tune                             [extruder], [extruder1] and [heater_bed] sections
## Probe pin                            [probe] section
## Resonance tester probe_positions     [resonance_tester]

##--------------------------------------------------------------------
## !!! Lines between the dashed lines need to be looked at and configured !!!
##--------------------------------------------------------------------

[include mainsail.cfg]
[include idex_config/idex_variables.cfg]
[include toolboard_0.cfg]
[include toolboard_1.cfg]

#####################################################################
#   Printer mainboard 
#####################################################################

[mcu]
##  Obtain definition by "ls -l /dev/serial/by-id/" then unplug to verify
##--------------------------------------------------------------------
serial: /dev/serial/by-id/my_mcu_id
restart_method: command
##--------------------------------------------------------------------

[printer]
kinematics: hybrid_corexy           # corexy for standard Trident
max_velocity: 400
max_accel: 5000                     # Max 8000
max_z_velocity: 15                  # Max 15 for 12V TMC Drivers, can increase for 24V
max_z_accel: 350
square_corner_velocity: 5.0

[input_shaper]                      # Leave empty for Tridex, shaper is set in the print_start macro.
                                    # See "idex_config/idex_variables.cfg" to set your shaper and frequency values.

[respond]                           # Enable sending data to the console.

[force_move]                        # Allow moving prior to homing.
enable_force_move: true

#####################################################################
#   Optional extra klipper features
#####################################################################

[exclude_object]

[idle_timeout]
timeout: 1800

#####################################################################
#   X Steppers
#####################################################################

[stepper_x] # A stepper - Right for Tridex
step_pin: PC13
dir_pin: !PF0
enable_pin: !PF1
rotation_distance: 40
microsteps: 32
endstop_pin: ^toolboard_0: PB3
position_min: -50

##--------------------------------------------------------------------
##  Uncomment for 250mm build
#position_endstop: -50   # 250 for standard Trident
#position_max: 225       # 250 for standard Trident, 225 for Standard Tridex.

##  Uncomment for 300mm build
#position_endstop: -50   # 300 for standard Trident
#position_max: 290       # 300 for standard Trident, 275 for standard Tridex

##  Uncomment for 350mm build
#position_endstop: -50   # 350 for standard Trident
#position_max: 325       # 350 for standard Trident, 325 for Standard Tridex.
##--------------------------------------------------------------------

homing_speed: 60
second_homing_speed: 3
homing_retract_dist: 5

##  Make sure to update below for your relevant driver (2208 or 2209)
[tmc2209 stepper_x] ## Socket stepper_5
uart_pin: PE4
interpolate: false
run_current: 1.2
sense_resistor: 0.110

[dual_carriage] # B stepper - Left for Tridex
axis: x
safe_distance: 50
step_pin: PG0
dir_pin: !PG1
enable_pin: !PF15
rotation_distance: 40
microsteps: 32
endstop_pin: toolboard_1: PB6

##--------------------------------------------------------------------
#position_min: 09 # 0 for standard Trident, 25 for standard Tridex
##--------------------------------------------------------------------
##  Uncomment for 250mm build
#position_endstop: 11    # 250 for standard Trident, 25 for standard Tridex
#position_max: 357       # 250 for standard Trident, 300 for standard Tridex

##  Uncomment for 300mm build
#position_endstop: 10    # 300 for standard Trident, 25 for standard Tridex
#position_endstop: 09    # 300 for standard Trident, 25 for standard Tridex
#position_max: 355       # 300 for standard Trident, 350 for standard Tridex

##  Uncomment for 350mm build
#position_endstop: 25    # 350 for standard Trident, 25 for standard Tridex
#position_max: 400       # 350 for standard Trident, 400 for standard Tridex
##--------------------------------------------------------------------

homing_speed: 60
second_homing_speed: 3
homing_retract_dist: 5

##  Make sure to update below for your relevant driver (2208 or 2209)
[tmc2209 dual_carriage] ## Socket stepper_1
uart_pin: PD11
interpolate: false
run_current: 1.2
sense_resistor: 0.110

#####################################################################
#   Y Steppers
#####################################################################

[stepper_y] ##  Y Stepper - Left
step_pin: PF13
dir_pin: PF12
enable_pin: !PF14
rotation_distance: 40
microsteps: 64
endstop_pin: ^PG13

##--------------------------------------------------------------------
position_min: 0 # 0 for standard Trident, 0 for standard Tridex
##--------------------------------------------------------------------
##  Uncomment for 250mm build
#position_endstop: 250   # 250 for standard Trident
#position_max: 250       # 250 for standard Trident, 250 for standard Tridex

##  Uncomment for 300mm build
#position_endstop: 310   # 300 for standard Trident
#position_max: 310       # 300 for standard Trident, 300 for standard Tridex

##  Uncomment for 350mm build
#position_endstop: 350   # 350 for standard Trident
#position_max: 350       # 350 for standard Trident, 400 for standard Tridex
##--------------------------------------------------------------------

homing_speed: 60
second_homing_speed: 5
homing_retract_dist: 5

##  Make sure to update below for your relevant driver (2208 or 2209)
[tmc2209 stepper_y] # Socket stepper_0
uart_pin: PC4
interpolate: false
run_current: 0.8
sense_resistor: 0.110

[stepper_y1] ##  Y Stepper - Right
step_pin: PE2
dir_pin: !PE3
enable_pin: !PD4
microsteps: 32
rotation_distance: 40
endstop_pin: ^PG9

##  Make sure to update below for your relevant driver (2208 or 2209)
[tmc2209 stepper_y1] # Socket stepper_6
uart_pin: PE1
interpolate: false
run_current: 0.8
sense_resistor: 0.110

#####################################################################
#   Z Steppers
#####################################################################

[stepper_z] # Z0 Stepper - Front Left
step_pin: PF11
dir_pin: PG3
enable_pin: !PG5

##--------------------------------------------------------------------
## Rotation Distance for TR8x8 = 8, TR8x4 = 4, TR8x2 = 2
rotation_distance: 4
##--------------------------------------------------------------------

microsteps: 32

##--------------------------------------------------------------------
endstop_pin: !PG12 # For default endstop pin behind bed
#endstop_pin: probe:z_virtual_endstop # for TAP
#position_endstop: 0.0
##--------------------------------------------------------------------

position_max: 245        # 250 for standard Trident and Tridex
position_min: -4         # Can be adjusted for pin / probe variation
homing_speed: 8          # 10 is recommended maximum.
second_homing_speed: 3
homing_retract_dist: 3

##  Make sure to update below for your relevant driver (2208 or 2209)
[tmc2209 stepper_z] # Socket stepper_2
uart_pin: PC6
interpolate: False
run_current: 0.8
sense_resistor: 0.110

[stepper_z1] # Z1 Stepper - Rear Center
step_pin: PG4
dir_pin: PC1
enable_pin: !PA0

##--------------------------------------------------------------------
## Rotation Distance for TR8x8 = 8, TR8x4 = 4, TR8x2 = 2
rotation_distance: 4
##--------------------------------------------------------------------

microsteps: 32

##  Make sure to update below for your relevant driver (2208 or 2209)
[tmc2209 stepper_z1] # Socket stepper_3
uart_pin: PC7
interpolate: False
run_current: 0.8
sense_resistor: 0.110

[stepper_z2] # Z2 Stepper - Front Right
step_pin: PF9
dir_pin: PF10
enable_pin: !PG2

##--------------------------------------------------------------------
## Rotation Distance for TR8x8 = 8, TR8x4 = 4, TR8x2 = 2
rotation_distance: 4
##--------------------------------------------------------------------

microsteps: 32

##  Make sure to update below for your relevant driver (2208 or 2209)
[tmc2209 stepper_z2] # Socket stepper_4
uart_pin: PF2
interpolate: False
run_current: 0.8
sense_resistor: 0.110


#####################################################################
#   Extruder PID - in printer.cfg so save_config works properly
#####################################################################

[extruder]
##--------------------------------------------------------------------
## PID control extruder, tune this
#control: pid
#pid_Kp: 36.965
#pid_Ki: 4.650
#pid_Kd: 73.468
##--------------------------------------------------------------------

[extruder1]
##--------------------------------------------------------------------
## PID control extruder1, tune this
#control: pid
#pid_Kp: 35.650
#pid_Ki: 4.850
#pid_Kd: 65.508
##--------------------------------------------------------------------

#####################################################################
#   Bed Heater
#####################################################################

[heater_bed]
heater_pin: PA3
## Check what thermistor type you have. See https://www.klipper3d.org/Config_Reference.html#common-thermistors for common thermistor types.
## Use "Generic 3950" for Keenovo heaters
sensor_type: Generic 3950
sensor_pin: PF3
max_power: 1.0
min_temp: 0
max_temp: 120

##--------------------------------------------------------------------
## Adjust cycle time to avoid flashing lights: 0.016 60Hz mains, 0.02 50Hz mains
pwm_cycle_time: 0.016
##--------------------------------------------------------------------

##--------------------------------------------------------------------
## PID control, tune this
control: pid
pid_Kp: 47.925
pid_Ki: 2.088
pid_Kd: 274.970
##--------------------------------------------------------------------

