#####################################################################
#
#  IDEX Homing Macros for Tridex (hybrid_corexy)
#
#  These macros are called from Klippain's homing_override.cfg.
#  Klipper only allows one [homing_override] block, so Klippain's
#  existing override handles all sensorless/probe logic, and these
#  macros add the IDEX-specific T1 homing steps.
#
#  Macros:
#      IDEX_HOME_Y  — Y homing (Y axis is shared; delegates to G28 Y)
#      IDEX_HOME_X  — X homing: homes T0 then parks T1 after homing
#
#####################################################################


#####################################################################
#   IDEX_HOME_Z
#   Called by homing_override.cfg at the start of the Z homing block.
#   Ensures T0 (with Voron TAP) is the active carriage before G28 Z.
#   The actual G28 Z, ACTIVATE_PROBE/DEACTIVATE_PROBE (vorontap),
#   and positioning are handled by Klippain's existing Z section.
#####################################################################

[gcode_macro IDEX_HOME_Z]
description: Ensure T0 is active for Z homing (TAP is on T0).
gcode:
    {% set idxvars = printer["gcode_macro IDEX_VARS"] %}
    {% if printer.dual_carriage is defined %}
        {% if printer.dual_carriage.carriage_0 == "INACTIVE" %}
            # Check if T1 is at a position T0 cannot reach.
            {% if printer.gcode_move.gcode_position.x|float > printer.configfile.config.stepper_x.position_max|float %}
                # T0 cannot reach T1's position — switch carriage without moving.
                {% if idxvars.debug_level|int > 0 %}
                    RESPOND MSG="IDEX_HOME_Z: T1 beyond T0 limits, switching carriage only."
                {% endif %}
                SET_DUAL_CARRIAGE CARRIAGE=0
                ACTIVATE_EXTRUDER EXTRUDER=extruder
            {% else %}
                # T0 can reach — do a full T0 activation (parks T1, clears offsets).
                {% if idxvars.debug_level|int > 0 %}
                    RESPOND MSG="IDEX_HOME_Z: T1 active, switching to T0 for Z homing."
                {% endif %}
                T0
            {% endif %}
            # Remove the T1 Z offset, preserving any babystepping adjustments.
            SET_GCODE_OFFSET X=0 Y=0 Z={printer.gcode_move.homing_origin.z|round(6)|float - idxvars.offset_z|round(6)|float} MOVE=0
        {% else %}
            {% if idxvars.debug_level|int > 1 %}
                RESPOND MSG="IDEX_HOME_Z: T0 already active, proceeding with Z home."
            {% endif %}
        {% endif %}
    {% endif %}


#####################################################################
#   IDEX_HOME_Y
#   Y axis is shared between T0 and T1 in hybrid_corexy.
#   Klippain's homing_override handles sensorless current and backoff.
#   This macro exists for naming compatibility with the Tridex RC2
#   reference and can be called directly for a standalone Y home.
#####################################################################

[gcode_macro IDEX_HOME_Y]
description: Home Y axis (shared axis for T0 and T1 in hybrid_corexy).
gcode:
    {% set idxvars = printer["gcode_macro IDEX_VARS"] %}
    {% if idxvars.toolhead_led %}
        STATUS_HOMING
        SET_DUAL_CARRIAGE CARRIAGE=1
        STATUS_HOMING
        SET_DUAL_CARRIAGE CARRIAGE=0
    {% endif %}
    G28 Y
    G91
    {% if idxvars.debug_level|int > 0 %}
        RESPOND MSG="IDEX_HOME_Y: Moving Y forward by 25mm."
    {% endif %}
    G0 Y-25 F2400
    G90
    {% if idxvars.toolhead_led %}
        STATUS_READY
        SET_DUAL_CARRIAGE CARRIAGE=1
        STATUS_READY
        SET_DUAL_CARRIAGE CARRIAGE=0
    {% endif %}


#####################################################################
#   IDEX_HOME_X
#   Called by homing_override.cfg after T0 (stepper_x) has been homed.
#   Homes T1 (dual_carriage) on X and parks it at its end of the rail.
#####################################################################

[gcode_macro IDEX_HOME_X]
description: Home T1 (dual_carriage) on X axis and park after T0 is homed.
gcode:
    {% set idxvars = printer["gcode_macro IDEX_VARS"] %}
    {% if printer.dual_carriage is defined %}
        {% if idxvars.debug_level|int > 0 %}
            RESPOND MSG="IDEX_HOME_X: Homing T1 (dual_carriage) on X."
        {% endif %}
        {% set park_t1_pos = printer.configfile.config.dual_carriage.position_max|float - idxvars.park_distance_t1 %}
        SET_DUAL_CARRIAGE CARRIAGE=1 MODE=PRIMARY
        ACTIVATE_EXTRUDER EXTRUDER=extruder1
        G28 X0
        G90
        G1 X{park_t1_pos} F{idxvars.homing_feedrate}
        SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
        ACTIVATE_EXTRUDER EXTRUDER=extruder
        {% if idxvars.debug_level|int > 0 %}
            RESPOND MSG="IDEX_HOME_X: T1 parked at X={park_t1_pos}, T0 active."
        {% endif %}
    {% endif %}
