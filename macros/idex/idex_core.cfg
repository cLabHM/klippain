#####################################################################
#
#  Klippain IDEX Core Macros for Tridex
#
#  Adapted for Klippain modular framework.
#  Based on Tridex RC2 macros by Joseph Greiner (GPL v3).
#  Naming and structure aligned to Tridex RC2 reference.
#
#  IMPORTANT — before using this file you must:
#    1. Comment out line 49 in config/hardware/extruder/galileo2_Tridex.cfg:
#       # [include ../../../macros/helpers/hotend_heater_ctrl.cfg]
#       (This file's M109 override replaces it with merged logic.)
#    2. Add IDEX variables to your save_variables.cfg (see bottom of this file).
#    3. Add [include ../macros/idex/*.cfg] to config/machine.cfg
#
#  WARNING: These macros control physical toolhead movement.
#  Test with debug_level=2, low speeds, and finger on the e-stop.
#
#####################################################################


#####################################################################
#   T0 / T1 — Slicer tool change entry points
#####################################################################

[gcode_macro T0]
variable_color: ""
variable_tool_num: 0
variable_carriage_num: 0
variable_btlane: 0
gcode:
    _ACTIVATE_TOOL TOOL_NUM={tool_num} CARRIAGE={carriage_num} BT_LANE={btlane}

[gcode_macro T1]
variable_color: ""
variable_tool_num: 1
variable_carriage_num: 1
variable_btlane: 0
gcode:
    _ACTIVATE_TOOL TOOL_NUM={tool_num} CARRIAGE={carriage_num} BT_LANE={btlane}


#####################################################################
#   _ACTIVATE_TOOL
#   Activates the correct carriage and extruder for the specified tool
#####################################################################

[gcode_macro _ACTIVATE_TOOL]
description: Activate a tool carriage and manage Box Turtle lane for specified tool.
    TOOL_NUM= {tool number}
    CARRIAGE= {carriage tool is physically mounted to}
    BT_LANE=  {Box Turtle lane assigned to this tool number}
gcode:
    {% set tool = params.TOOL_NUM|int|default(0) %}
    {% set carriage = params.CARRIAGE|int|default(0) %}
    # The AFC is not installed OR not used with this tool
    # Check for the active carriage
    {% if printer.dual_carriage['carriage_' + carriage|string] == "INACTIVE" %}
        # Carriage is inactive, so we need to activate it.
        RESPOND MSG="Activating Carriage {carriage} for T{tool}."
        _TOOL_CHANGE T={carriage}
    {% else %}
        # Carriage is already active.
        RESPOND MSG="Carriage {carriage} for T{tool} is already active."
    {% endif %}
    _UPDATE_GUI_COLOR_VAR T={tool}


#####################################################################
#   _UPDATE_GUI_COLOR_VAR
#   Updates Mainsail button colour for the active tool
#####################################################################

[gcode_macro _UPDATE_GUI_COLOR_VAR]
description: Update the color variable for the active tool in Mainsail.
gcode:
    {% set active_tool = printer["gcode_macro IDEX_VARS"].active_tool %}
    {% set active_tool_color = printer["gcode_macro IDEX_VARS"].active_tool_color|string %}
    {% set calling_tool = params.T|default(0) %}

    RESPOND MSG="Updating GUI for tool {calling_tool}"
    SET_GCODE_VARIABLE MACRO=T{active_tool} VARIABLE=color VALUE="''"
    SET_GCODE_VARIABLE MACRO=T{calling_tool} VARIABLE=color VALUE="'{active_tool_color}'"
    SET_GCODE_VARIABLE MACRO=IDEX_VARS VARIABLE=active_tool VALUE={calling_tool}


#####################################################################
#   _TOOL_CHANGE
#   Core tool-change logic — dispatches to SWAP or CLASSIC
#####################################################################

[gcode_macro _TOOL_CHANGE]
description: Activate one of the tool carriages in "FULL_CONTROL" or "AUTO-PARK"
gcode:
    {% set idxvars = printer["gcode_macro IDEX_VARS"] %}
    {% set tweaked_z_offset = printer.gcode_move.homing_origin.z|round(3)|float %}
    {% set tool = params.T|default(0)|int %}
    M400
    # Check to make sure there is a second carriage
    {% if printer.dual_carriage is defined %}
        # If the printer isn't homed, just change over to the other tool head.
        # This makes loading filament and purging a little easier.
        {% if "xyz" not in printer.toolhead.homed_axes %}
            # Activate T0.
            {% if tool == 0 %}
                {% if printer.dual_carriage.carriage_0 == "INACTIVE" %}
                    # Reset the gcode offsets
                    SET_GCODE_OFFSET X=0 Y=0 Z={(tweaked_z_offset - idxvars.offset_z)|round(3)} MOVE=0
                {% endif %}
                ACTIVATE_EXTRUDER EXTRUDER=extruder
                SET_DUAL_CARRIAGE CARRIAGE=0
            # Activate T1.
            {% elif tool == 1 %}
                {% if printer.dual_carriage.carriage_0 == "INACTIVE" %}
                    # Reset the gcode offsets
                    SET_GCODE_OFFSET X={idxvars.offset_x} Y={idxvars.offset_y} Z={(tweaked_z_offset + idxvars.offset_z)|round(3)} MOVE=0
                {% endif %}
                ACTIVATE_EXTRUDER EXTRUDER=extruder1
                SET_DUAL_CARRIAGE CARRIAGE=1
            # Unhandled tool set
            {% else %}
                RESPOND MSG="Unhandled Tool T{tool}. Cannot complete change."
            {% endif %}
            # Let the user know that a tool was activated
            {% if idxvars.debug_level|int > 1 %}
                RESPOND MSG="Toolchange called prior to homing, T{tool} activated."
            {% endif %}
        # Printer is homed, we are going to move the tools around.
        {% else %}
            # If Z hop is enabled in the users config.
            {% if idxvars.z_hop|float > 0.0 %}
                _TOOL_CHANGE_Z_HOP DIR="UP"
            {% endif %}
            # Call the appropriate macros for the tool change method.
            {% if idxvars.swap_toolheads == 1 %}
                # Swap mode is active.
                {% if idxvars.debug_level|int > 0 %}
                    RESPOND MSG="Toolchange - Swap tool change activated."
                {% endif %}
                # Set the active tool head LEDS.
                {% if idxvars.toolhead_led %}
                    STATUS_READY
                {% endif %}
                # Swap the tool
                _SWAP_TOOL
                {% if idxvars.debug_level|int > 1 %}
                    RESPOND MSG="Toolchange - Swap tool change completed."
                {% endif %}
            {% else %}
                # Classic mode is active.
                {% if idxvars.debug_level|int > 0 %}
                    RESPOND MSG="Toolchange - Classic tool change activated."
                {% endif %}
                # Check to see if autopark is active.
                {% if idxvars.autopark == 1 %}
                    # Save the gcode_state.
                    SAVE_GCODE_STATE NAME=toolhead_state
                    # Park the tool.
                    _PARK_TOOL
                    {% if idxvars.toolhead_led %}
                        STATUS_READY
                    {% endif %}
                {% endif %}
                # Activate T0 extruder and carriage.
                {% if tool == 0 %}
                    ACTIVATE_EXTRUDER EXTRUDER=extruder
                    SET_DUAL_CARRIAGE CARRIAGE=0
                # Activate T1 extruder and carriage.
                {% elif tool == 1 %}
                    ACTIVATE_EXTRUDER EXTRUDER=extruder1
                    SET_DUAL_CARRIAGE CARRIAGE=1
                # Unhandled tool set.
                {% else %}
                    RESPOND MSG="Unhandled Tool T{tool}. Cannot complete change."
                {% endif %}
                # Let the user know that a tool was activated.
                {% if idxvars.debug_level|int > 1 %}
                    RESPOND MSG="Toolchange - T{tool} carriage and extruder activated."
                {% endif %}
                # Scrub the nozzle if enabled.
                {% if idxvars.scrub|int == 1 %}
                    _NOZZLE_SCRUB
                {% endif %}
                # Restore the gcode_state.
                {% if idxvars.autopark == 1 %}
                    RESTORE_GCODE_STATE NAME=toolhead_state MOVE={idxvars.immediate_move} MOVE_SPEED={idxvars.feedrate|int / 60}
                {% endif %}
            {% endif %}
            # Reset the offsets for T0.
            {% if tool == 0 %}
                # Check if we have tweaked the z offset.
                {% if tweaked_z_offset == 0 %}
                    # Set all the offsets to 0.
                    SET_GCODE_OFFSET X=0 Y=0 Z=0 MOVE=1
                    {% if idxvars.debug_level|int > 1 %}
                        RESPOND MSG="Toolchange - All offsets cleared for T{tool}, no tweaked Z offset found."
                    {% endif %}
                {% else %}
                    # The z height was tweaked, make sure we remove the T1 Z offset from it
                    SET_GCODE_OFFSET X=0 Y=0 Z={(tweaked_z_offset - idxvars.offset_z)|round(3)} MOVE={idxvars.immediate_move}
                    {% if idxvars.debug_level|int > 1 %}
                        RESPOND MSG="Toolchange - XYZ Offsets set for T{tool}, Z returned to tweaked offset."
                    {% endif %}
                {% endif %}
            # Set the offsets for T1.
            {% elif tool == 1 %}
                # Check if we have tweaked the z offset.
                {% if ((tweaked_z_offset + idxvars.offset_z)|round(3)) == 0 %}
                    {% set tweaked_z_offset = tweaked_z_offset + 0.000001 %} #never allow the tweaked offset and set offset to equal 0 causes compounding issues.
                    {% if idxvars.debug_level|int > 1 %}
                        RESPOND MSG="Toolchange - T{tool}, no tweaked Z offset found."
                    {% endif %}
                {% endif %}
                # Set the offsets for T1.
                SET_GCODE_OFFSET X={idxvars.offset_x} Y={idxvars.offset_y} Z={(tweaked_z_offset + idxvars.offset_z)|round(3)} MOVE={idxvars.immediate_move}
                {% if idxvars.debug_level|int > 1 %}
                    RESPOND MSG="Toolchange - XYZ Offsets set for T{tool}, Z returned to tweaked offset."
                {% endif %}
            # Unhandled tool set.
            {% else %}
                RESPOND MSG="Unhandled Tool T{tool}. Cannot complete change."
            {% endif %}
            # Set the print fans speed.
            _SET_PRINT_FANS_SPEED
            # If Z hop is enabled in the users config.
            {% if idxvars.z_hop|float > 0.0 %}
                _TOOL_CHANGE_Z_HOP DIR="DOWN"
            {% endif %}
            # Set the active tool head LEDs.
            {% if idxvars.toolhead_led %}
                STATUS_PRINTING
            {% endif %}
        {% endif %}
    {% else %}
        {% if idxvars.debug_level|int > 1 %}
            RESPOND MSG="Config section [dual_carriage] is not defined. Cannot change carriage."
        {% endif %}
    {% endif %}


#####################################################################
#   _TOOL_CHANGE_Z_HOP
#   Controls the z_hop for tool changes.
#####################################################################

[gcode_macro _TOOL_CHANGE_Z_HOP]
description: Z hop control for the tool change macros.
gcode:
    {% set idxvars = printer["gcode_macro IDEX_VARS"] %}
    {% set direction = params.DIR|upper %}
    {% set max_z = printer.toolhead.axis_maximum.z|float %}
    {% set cur_z = printer.toolhead.position.z|float %}
    {% set z_safe = idxvars.z_hop|float if cur_z < (max_z - idxvars.z_hop|float) else (max_z - cur_z) %}
    # Move the tool up in the z axis
    {% if direction == "UP" %}
        G91
        G1 Z{z_safe}
        G90
        # Tell the user we moved up in Z.
        {% if idxvars.debug_level|int > 1 %}
            RESPOND MSG="Toolchange - Z hop moved +{z_safe}."
        {% endif %}
    {% elif direction == "DOWN" %}
        G91
        G1 Z-{z_safe}
        G90
        # Tell the user we moved down in Z.
        {% if idxvars.debug_level|int > 1 %}
            RESPOND MSG="Toolchange - Z hop moved -{z_safe}."
        {% endif %}
    {% else %}
        {% if idxvars.debug_level|int > 0 %}
            RESPOND MSG="Toolchange - Z height direction must be specified."
        {% endif %}
    {% endif %}


#####################################################################
#   _SWAP_TOOL
#   Simultaneous tool swap using Klipper COPY mode trick
#   Idea and implementation inspired by Helge Keck's Vcore IDEX macros.
#####################################################################

[gcode_macro _SWAP_TOOL]
description: Swap toolheads for faster toolchanges
gcode:
    {% set idxvars = printer["gcode_macro IDEX_VARS"] %}
    # Check the active tool head, so we know what tool we are going to activate
    {% if printer.dual_carriage.carriage_0 == "INACTIVE" %}
        # T0 is inactive, so we are going to make it active.
        {% set swap_tool = 0 %}
    {% else %}
        # T1 is inactive, so we are going to make it active
        {% set swap_tool = 1 %}
    {% endif %}
    # Check to make sure that the parking distance is larger than the X offset.
    _PARKING_DISTANCE_CHECK
    # Set the parking distance used in this macro.
    {% if idxvars.park_distance_t1|float < idxvars.offset_x|float %}
        {% set parking_distance = idxvars.offset_x|float + 1 %}
    {% else %}
        {% set parking_distance = idxvars.park_distance_t1|float %}
    {% endif %}
    M400
    # Set the tool head positions based on tool number set
    {% if swap_tool == 0 %}
        # Swapping to T0, setup the variables with the positions.
        {% set t0_curr_pos = printer.configfile.config.stepper_x.position_endstop|float + idxvars.park_distance_t0 %}
        {% set t1_curr_pos = printer.gcode_move.gcode_position.x|float %}
        {% set t0_new_x = t1_curr_pos %}
        {% set t1_new_x = printer.configfile.config.dual_carriage.position_max|float - idxvars.park_distance_t1 %}
        {% set t0_distance = (t0_new_x - t0_curr_pos)|round(3) %}
        {% set t1_distance = (t1_new_x - t1_curr_pos)|round(3) %}
        {% if idxvars.debug_level|int > 1 %}
            RESPOND MSG="Current T0 position = {t0_curr_pos} : Current T1 position = {t1_curr_pos}"
            RESPOND MSG="T0 target position = {t0_new_x} : T1 target position = {t1_new_x}"
            RESPOND MSG="Moving T0 a distance of {t0_distance} : Moving T1 a distance of {t1_distance}"
            RESPOND MSG="Current parking distance from T1 position_max = {idxvars.park_distance_t1}"
        {% endif %}
    {% elif swap_tool == 1 %}
        # Swapping to T1, setup the variables with the positions.
        {% set t0_curr_pos = printer.gcode_move.gcode_position.x|float %}
        {% set t1_curr_pos = printer.configfile.config.dual_carriage.position_max|float - idxvars.park_distance_t1 %}
        {% set t0_new_x = printer.configfile.config.stepper_x.position_endstop|float + idxvars.park_distance_t0 %}
        {% set t1_new_x = t0_curr_pos %}
        {% set t0_distance = (t0_curr_pos - t0_new_x)|round(3) %}
        {% set t1_distance = (t1_curr_pos - t1_new_x)|round(3) %}
        {% if idxvars.debug_level|int > 1 %}
            RESPOND MSG="Current T0 position = {t0_curr_pos} : Current T1 position = {t1_curr_pos}"
            RESPOND MSG="T0 target position = {t0_new_x} : T1 target position = {t1_new_x}"
            RESPOND MSG="Moving T0 a distance of {t0_distance} : Moving T1 a distance of {t1_distance}"
            RESPOND MSG="Current parking distance from T0 position_min = {idxvars.park_distance_t0}"
        {% endif %}
    {% endif %}
    M400
    # Make sure we are in absolute positioning mode before continuing.
    G90
    # Save the gcode_state.
    SAVE_GCODE_STATE NAME=swap_state
    # If T0 is moving further or the same as T1.
    {% if t0_distance|abs >= t1_distance|abs %}
        {% if idxvars.debug_level|int > 1 %}
            RESPOND MSG="T0 moving further or the same distance as T1."
        {% endif %}
        # Set mode to copy.
        SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
        SET_DUAL_CARRIAGE CARRIAGE=1 MODE=COPY
        # Perform the copy mode move.
        {% if swap_tool == 0 %}
            # Move towards the right by T1 distance.
            {% if idxvars.debug_level|int > 1 %}
                RESPOND MSG="Moving toolheads towards T1 parking."
            {% endif %}
            G0 X{t0_curr_pos + (t1_distance)} F{idxvars.feedrate}
        {% elif swap_tool == 1 %}
            # Move towards the left by T1 distance.
            {% if idxvars.debug_level|int > 1 %}
                RESPOND MSG="Moving toolheads towards T0 parking."
            {% endif %}
            G0 X{t0_curr_pos - t1_distance} F{idxvars.feedrate}
        {% endif %}
        {% if idxvars.debug_level|int > 1 %}
            RESPOND MSG="T1 in position, decoupling T1 from T0 motion queue."
        {% endif %}
        # Remove T1 from copy mode.
        SET_DUAL_CARRIAGE CARRIAGE=1 MODE=PRIMARY
        ACTIVATE_EXTRUDER EXTRUDER=extruder1
        {% if idxvars.debug_level|int > 1 %}
            RESPOND MSG="T0 moving to final position."
        {% endif %}
        # Finish moving T0 into position.
        SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
        ACTIVATE_EXTRUDER EXTRUDER=extruder
        G0 X{t0_new_x} F{idxvars.feedrate}
    # if T0 is moving less than T1.
    {% elif t0_distance|abs < t1_distance|abs %}
        {% if idxvars.debug_level|int > 1 %}
            RESPOND MSG="T1 moving further than T0."
        {% endif %}
        # Set mode to copy.
        SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
        SET_DUAL_CARRIAGE CARRIAGE=1 MODE=COPY
        # Move T0 into position.
        G0 X{t0_new_x} F{idxvars.feedrate}
        {% if idxvars.debug_level|int > 1 %}
            RESPOND MSG="T0 in position, decoupling T1 from T0 motion queue."
        {% endif %}
        # Clear the copy mode and activate T1 carriage.
        SET_DUAL_CARRIAGE CARRIAGE=1 MODE=PRIMARY
        ACTIVATE_EXTRUDER EXTRUDER=extruder1
        {% if idxvars.debug_level|int > 1 %}
            RESPOND MSG="T1 moving to final position."
        {% endif %}
        # Finish moving T1 into position.
        G0 X{t1_new_x} F{idxvars.feedrate}
    {% endif %}
    # Activate the correct tool to finish
    {% if swap_tool == 0 %}
        # Set the active carriage to T0.
        SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
        ACTIVATE_EXTRUDER EXTRUDER=extruder
    {% elif swap_tool == 1 %}
        SET_DUAL_CARRIAGE CARRIAGE=1 MODE=PRIMARY
        ACTIVATE_EXTRUDER EXTRUDER=extruder1
    {% endif %}
    # Restore the gcode_state.
    RESTORE_GCODE_STATE NAME=swap_state MOVE={idxvars.immediate_move}


#####################################################################
#   _PARKING_DISTANCE_CHECK
#   Auto-adjusts park distance if X offset is too large
#####################################################################

[gcode_macro _PARKING_DISTANCE_CHECK]
description: Automatically adjusted parking area to avoid move out of range errors.
gcode:
    {% set idxvars = printer["gcode_macro IDEX_VARS"] %}
    # Check to see if the parking distance is big enough to fit the offset
    {% if idxvars.offset_x|float > idxvars.park_distance_t1|float %}
        {% if idxvars.debug_level|int > 1 %}
            RESPOND MSG="X_Offset = {idxvars.offset_x} : Parking distance T1 = {idxvars.park_distance_t1}"
        {% endif %}
        # Let the user know that the x_offset is larger than the parking distance and that the parking distance has been adjusted.
        RESPOND MSG="Your X offset for T1 is larger than your parking distance, let me fix that for you."
        SET_GCODE_VARIABLE MACRO=IDEX_VARS VARIABLE=park_distance_t1 VALUE={idxvars.offset_x|float + 1}
        # Save the adjustment to the save file
        SAVE_OFFSETS_TO_DISK
        {% if idxvars.debug_level|int > 1 %}
            # Let the user know the new parking distance
            RESPOND MSG="T1 Parking distance updated to {idxvars.offset_x|float + 1}"
        {% endif %}
    {% else %}
        {% if idxvars.debug_level|int > 1 %}
            RESPOND MSG="X_Offset = {idxvars.offset_x} : Parking distance T1 = {idxvars.park_distance_t1}"
        {% endif %}
    {% endif %}


#####################################################################
#   _PARK_TOOL
#   Parks the ACTIVE tool at its end of the X rail
#   (This is NOT the Klippain PARK macro — that one parks at a
#    user-defined XY position. This parks at the rail endpoint.)
#####################################################################

[gcode_macro _PARK_TOOL]
description: Parks the tool at the end of the axis minus the configured parking distance.
gcode:
    {% set idxvars = printer["gcode_macro IDEX_VARS"] %}
    {% if printer.dual_carriage is defined %}
        SAVE_GCODE_STATE NAME=park_tool
        SET_GCODE_OFFSET X=0 Y=0 Z=0
        G90
        # Check for proper parking distance.
        _PARKING_DISTANCE_CHECK
        # Set the parking distance used in this macro.
        {% if idxvars.park_distance_t1|float < idxvars.offset_x|float %}
            {% set parking_distance = idxvars.park_distance_t1|float + 1 %}
        {% else %}
            {% set parking_distance = idxvars.park_distance_t1|float %}
        {% endif %}
        # Check which tool head we are parking.
        {% if printer.toolhead.extruder == 'extruder' %}
            {% if idxvars.debug_level|int > 1 %}
                RESPOND MSG="Parking toolhead 0"
            {% endif %}
            {% set XPOS = printer.configfile.config.stepper_x.position_endstop|float + idxvars.park_distance_t0 %}
            G1 X{XPOS} F{idxvars.feedrate}
        {% elif printer.toolhead.extruder == 'extruder1' %}
            {% if idxvars.debug_level|int > 1 %}
                RESPOND MSG="Parking toolhead 1"
            {% endif %}
            {% set XPOS = printer.configfile.config.dual_carriage.position_max|float - parking_distance %}
            G1 X{XPOS} F{idxvars.feedrate}
        {% else %}
            RESPOND TYPE=error MSG={ "Unknown extruder: %s".format(printer.toolhead.extruder) }
        {% endif %}
        {% if idxvars.toolhead_led %}
            STATUS_READY
        {% endif %}
        RESTORE_GCODE_STATE NAME=park_tool
    {% endif %}


#####################################################################
#   _NOZZLE_SCRUB
#   Brushes nozzle across wipers to remove ooze.
#####################################################################

[gcode_macro _NOZZLE_SCRUB]
description: Scrubs the nozzle against the wipers to clean it.
gcode:
    {% set idxvars = printer["gcode_macro IDEX_VARS"] %}
    {% if printer.dual_carriage is defined and printer.toolhead.extruder in ['extruder', 'extruder1'] %}
        G90 ; Absolute Positioning.
        {% set MIN = 1 %}
        {% set MAX = 20.0 %}
        {% set T0_MIN = printer.configfile.config.stepper_x.position_min|float + idxvars.park_distance_t0 %}
        {% set T1_MIN = printer.configfile.config.dual_carriage.position_max|float - idxvars.park_distance_t1 %}
        {% if printer.toolhead.extruder == 'extruder' %}
            {% set TEMP = printer.extruder.temperature %}
            {% set XMAX = T0_MIN %}
            {% set XPOS = T0_MIN + (MIN|float) %}
            {% set XPOS1 = T0_MIN + (MAX|float) %}
        {% else %}
            {% set TEMP = printer.extruder1.temperature %}
            {% set XMAX = T1_MIN %}
            {% set XPOS = T1_MIN - (MIN|float) %}
            {% set XPOS1 = T1_MIN - (MAX|float) %}
        {% endif %}

        # If extruder hot enough, purge.
        {% if TEMP >= idxvars.purge_temp_min %}
            G90 ; Absolute Positioning.
            G1 X{XMAX} F{idxvars.prep_spd_xy}
            M83      ; relative mode.
            G1 E{idxvars.purge_length} F{idxvars.purge_spd}
            G1 E-{idxvars.purge_ret} F{idxvars.purge_spd * 5}

            G90 ; Absolute Positioning.
            G1 X{XPOS} F{idxvars.prep_spd_xy}
            G4 P{idxvars.ooze_dwell * 1000} ; pause.
            G92 E0   ; reset extruder.

            G90 ; Absolute Positioning.
            G1 X{XPOS1} F{idxvars.prep_spd_xy}
            {% if idxvars.debug_level|int > 1 %}
                RESPOND MSG="Scrubbing nozzle"
            {% endif %}
            {% if idxvars.toolhead_led %}
                STATUS_CLEANING
            {% endif %}
            {% for i in range(idxvars.scrubs) %}
                G1 X{XPOS} F{idxvars.feedrate}
                G1 X{XPOS1} F{idxvars.feedrate}
            {% endfor %}
            G1 X{XPOS} F{idxvars.prep_spd_xy}
            {% if idxvars.toolhead_led %}
                STATUS_PRINTING
            {% endif %}
        {% else %}
            {% if idxvars.debug_level|int > 1 %}
                RESPOND MSG="Temperature too low to scrub nozzle."
            {% endif %}
        {% endif %}
        G90 ; Absolute Positioning.
    {% endif %}


#####################################################################
#   M106 / M107 — Print fan overrides for dual toolheads
#   Routes fan commands to the correct fan_generic instances
#####################################################################

[gcode_macro M106]
description: Override "M106" to account for multiple extruders.
gcode:
    {% set idxvars = printer["gcode_macro IDEX_VARS"] %}
    {% set raw_speed = params.S|default(0)|float %}
    {% set fan_speed = (raw_speed / 255.0)|round(2) %}
    {% if params.P is defined %}
        {% set param_fan = params.P|int %}
        {% if param_fan == 0 %}
            {% set P_fan = idxvars.fan0 %}
            SET_FAN_SPEED FAN={P_fan} SPEED={fan_speed}
        {% elif param_fan == 1 %}
            {% set P_fan = idxvars.fan1 %}
            SET_FAN_SPEED FAN={P_fan} SPEED={fan_speed}
        {% else %}
            RESPOND MSG="gcode_macro M106: Unknown fan {param_fan}, please use SET_FAN_SPEED."
        {% endif %}
    {% elif printer.dual_carriage is defined %}
        _SET_PRINT_FANS_SPEED SPEED={fan_speed}
    {% endif %}

[gcode_macro M107]
description: Override "M107" to account for multiple extruders.
gcode:
    M106 S0

[gcode_macro _SET_PRINT_FANS_SPEED]
gcode:
    {% set idxvars = printer["gcode_macro IDEX_VARS"] %}
    {% if params.SPEED is defined %}
        {% set fan_speed = params.SPEED|float %}
    {% else %}
        # read print fan speed from active extruder.
        {% set fan0_speed = printer["fan_generic " + idxvars.fan0].speed|float %}
        {% set fan1_speed = printer["fan_generic " + idxvars.fan1].speed|float %}
        {% set fan_speed = [fan0_speed, fan1_speed]|max %}
    {% endif %}
    SET_FAN_SPEED FAN={idxvars.fan0} SPEED={fan_speed}
    SET_FAN_SPEED FAN={idxvars.fan1} SPEED={fan_speed}


#####################################################################
#   M104 override — Sync extruder temps in COPY / MIRROR modes
#####################################################################

[gcode_macro M104]
rename_existing: M104.1
description: Override "M104" to sync extruders during COPY and MIRROR modes.
gcode:
    {% set idxvars = printer["gcode_macro IDEX_VARS"] %}
    {% set set_temp = params.S|int %}
    {% set set_tool = params.T|default(0)|int %}
    {% if set_tool > 1 %}
        {% set set_tool = 1 %}
    {% endif %}

    # Setup the behavior of setting the extruder temps while in copy / mirror mode.
    {% if (printer.dual_carriage.carriage_1 == 'MIRROR') or (printer.dual_carriage.carriage_1 == 'COPY') %}
        {% if (set_tool == 1) %}
            # If T1 is sent, set the temp and exit this macro.
            M104.1 S{set_temp} T{set_tool}
        {% else %}
            # No tool specified, or T0.
            # Check to see if the set_temp equals to the stored print temp.
            {% if (set_temp == idxvars.t0_copy_mirror_temp_print|int) %}
                # We are requesting the set temp that the slicer sent for T0 printing.
                M104.1 S{idxvars.t0_copy_mirror_temp_print} T0
                # Set T1 to the temp the slicer sent over.
                M104.1 S{idxvars.t1_copy_mirror_temp_print} T1
            {% else %}
                # We are adjusting T0 temp.
                M104.1 S{set_temp} T0
                # Update the stored temp because the user overrode the one sent by the slicer.
                {% if (set_temp != idxvars.t0_copy_mirror_temp_start) %}
                    SET_GCODE_VARIABLE MACRO=IDEX_VARS VARIABLE=t0_copy_mirror_temp_print VALUE={set_temp}
                {% endif %}
            {% endif %}
        {% endif %}
    {% else %}
        {% if printer.toolhead.extruder == 'extruder1' %}
            {% set set_tool = 1 %}
        {% endif %}
        M104.1 S{set_temp} T{set_tool}
    {% endif %}


#####################################################################
#   M109 override — MERGED: Klippain temperature-settle fix
#   + IDEX COPY/MIRROR temperature sync
#
#   This REPLACES the Klippain hotend_heater_ctrl.cfg override.
#   You MUST comment out:
#     [include ../../../macros/helpers/hotend_heater_ctrl.cfg]
#   in config/hardware/extruder/galileo2_Tridex.cfg
#####################################################################

[gcode_macro M109]
rename_existing: M109.1
description: Override "M109" to sync extruders during COPY and MIRROR modes.
gcode:
    {% set idxvars = printer["gcode_macro IDEX_VARS"] %}
    {% set uvars = printer["gcode_macro _USER_VARIABLES"] %}
    {% set set_temp = params.S|float %}
    {% set set_tool = params.T|default(0)|int %}
    {% set fix_settle = uvars.fix_heaters_temperature_settle %}
    {% if set_tool > 1 %}
        {% set set_tool = 1 %}
    {% endif %}

    # Setup the behavior of setting the extruder temps while in copy / mirror mode.
    {% if (printer.dual_carriage.carriage_1 == 'MIRROR') or (printer.dual_carriage.carriage_1 == 'COPY') %}
        {% if (set_tool == 1) %}
            # If T1 is sent, set the temp and exit this macro.
            M109.1 S{set_temp} T{set_tool}
        {% else %}
            # No tool specified, or T0.
            # Check to see if the set_temp equals to the stored print temp.
            {% if (set_temp == idxvars.t0_copy_mirror_temp_print|int) %}
                # We are requesting the set temp that the slicer sent for T0 printing.
                M109.1 S{idxvars.t0_copy_mirror_temp_print} T0
                # Set T1 to the temp the slicer sent over.
                M109.1 S{idxvars.t1_copy_mirror_temp_print} T1
            {% else %}
                # We are adjusting T0 temp.
                M109.1 S{set_temp} T0
                # Update the stored temp because the user overrode the one sent by the slicer.
                {% if (set_temp != idxvars.t0_copy_mirror_temp_start) %}
                    SET_GCODE_VARIABLE MACRO=IDEX_VARS VARIABLE=t0_copy_mirror_temp_print VALUE={set_temp}
                {% endif %}
            {% endif %}
        {% endif %}
    {% else %}
        # PRIMARY mode — route to correct extruder
        {% if printer.toolhead.extruder == 'extruder1' %}
            {% set set_tool = 1 %}
        {% endif %}

        # Klippain temperature-settle fix for low-inertia hotends
        {% if fix_settle %}
            M104.1 S{set_temp} T{set_tool}
            {% if set_temp != 0 %}
                {% if set_tool == 0 %}
                    {% set actual = printer.extruder.temperature|float %}
                    {% if actual <= set_temp %}
                        TEMPERATURE_WAIT SENSOR=extruder MINIMUM={set_temp}
                    {% else %}
                        TEMPERATURE_WAIT SENSOR=extruder MAXIMUM={set_temp}
                    {% endif %}
                {% elif set_tool == 1 %}
                    {% set actual = printer.extruder1.temperature|float %}
                    {% if actual <= set_temp %}
                        TEMPERATURE_WAIT SENSOR=extruder1 MINIMUM={set_temp}
                    {% else %}
                        TEMPERATURE_WAIT SENSOR=extruder1 MAXIMUM={set_temp}
                    {% endif %}
                {% endif %}
            {% endif %}
        {% else %}
            M109.1 S{set_temp} T{set_tool}
        {% endif %}
    {% endif %}


#####################################################################
#   M605 — Printing mode selection (slicer interface)
#   S0 = full control (no autopark)
#   S1 = primary with autopark (default for IDEX prints)
#   S2/S5 = copy mode
#   S3/S6 = mirror mode
#####################################################################

[gcode_macro M605]
description: Set the dual-carriages mode from slicers.
gcode:
    {% set idxvars = printer["gcode_macro IDEX_VARS"] %}
    {% set mode = params.S|default(1)|int %}

    {% if idxvars.debug_level|int > 0 %}
        RESPOND MSG="M605 received from gcode file."
    {% endif %}

    {% if (mode) == 0 %}
        {% if idxvars.debug_level|int > 0 %}
            RESPOND MSG="Setting printer mode to full control with autopark."
        {% endif %}
        SET_GCODE_VARIABLE MACRO=IDEX_VARS VARIABLE=autopark VALUE=0
        SET_DUAL_CARRIAGE CARRIAGE=1 MODE=PRIMARY   # In case the last print was a copy / mirror.
        SYNC_EXTRUDER_MOTION EXTRUDER=extruder1 MOTION_QUEUE=extruder1
        SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
    {% elif (mode) == 1 %}
        # Primary with auto_park.
        ACTIVATE_PRIMARY_MODE
    {% elif (mode) == 2 or (mode) == 5 %}
        # Copy mode.
        ACTIVATE_COPY_MODE
    {% elif (mode) == 3 or (mode) == 6 %}
        # Mirror mode.
        ACTIVATE_MIRROR_MODE
    {% endif %}

    {% if (mode) == 5 or (mode) == 6 %}
        RESPOND MSG="Please setup rafts in your slicer"
    {% endif %}


#####################################################################
#   Printing mode activation macros
#####################################################################

[gcode_macro ACTIVATE_PRIMARY_MODE]
description: Set the carriages for PRIMARY mode printing.
gcode:
    {% set idxvars = printer["gcode_macro IDEX_VARS"] %}
    {% if idxvars.debug_level|int > 0 %}
        RESPOND MSG="Setting printer mode to PRIMARY with autopark."
    {% endif %}
    SET_GCODE_VARIABLE MACRO=IDEX_VARS VARIABLE=autopark VALUE=1
    {% if idxvars.debug_level|int > 1 %}
        RESPOND MSG="IDEX_VARS autopark updated to 1."
    {% endif %}
    SET_DUAL_CARRIAGE CARRIAGE=1 MODE=PRIMARY  # In case the last print was a copy / mirror.
    SYNC_EXTRUDER_MOTION EXTRUDER=extruder1 MOTION_QUEUE=extruder1
    {% if idxvars.debug_level|int > 1 %}
        RESPOND MSG="Tool head 1 set to PRIMARY with extruder1 motion queue set."
    {% endif %}
    SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
    ACTIVATE_EXTRUDER EXTRUDER=extruder
    {% if idxvars.debug_level|int > 1 %}
        RESPOND MSG="Tool head 0 set to PRIMARY with extruder motion queue set."
    {% endif %}

[gcode_macro ACTIVATE_COPY_MODE]
description: Set the carriages for COPY mode.
gcode:
    {% set idxvars = printer["gcode_macro IDEX_VARS"] %}
    {% set T0_START = idxvars.copy_start_x|float %}
    {% set T1_START = (printer.configfile.config.stepper_x.position_min|float + printer.configfile.config.dual_carriage.position_max|float) / 2 + T0_START|float %}

    {% if idxvars.debug_level|int > 0 %}
        RESPOND MSG="COPY mode activated"
    {% endif %}
    {% if idxvars.debug_level|int > 1 %}
        RESPOND MSG="T0 start position: {T0_START}"
        RESPOND MSG="T1 start position: {T1_START}"
    {% endif %}

    SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
    G0 X{T0_START} Y{idxvars.copy_start_y} Z{idxvars.copy_start_z} F{idxvars.feedrate}

    {% if idxvars.toolhead_led %}
        STATUS_PRINTING
    {% endif %}

    SET_DUAL_CARRIAGE CARRIAGE=1 MODE=PRIMARY
    G0 X{T1_START} F{idxvars.feedrate}

    {% if idxvars.toolhead_led %}
        STATUS_PRINTING
    {% endif %}

    SET_DUAL_CARRIAGE CARRIAGE=1 MODE=COPY
    SYNC_EXTRUDER_MOTION EXTRUDER=extruder1 MOTION_QUEUE=extruder

    {% if idxvars.debug_level|int > 1 %}
        RESPOND MSG="Tool head 1 set to COPY with extruder motion queue set."
    {% endif %}

[gcode_macro ACTIVATE_MIRROR_MODE]
description: Set the carriages for MIRROR mode.
gcode:
    {% set idxvars = printer["gcode_macro IDEX_VARS"] %}
    {% set T0_START = idxvars.copy_start_x|float %}
    {% set T1_START = (printer.configfile.config.stepper_x.position_min|float + printer.configfile.config.dual_carriage.position_max|float) - T0_START|float %}

    {% if idxvars.debug_level|int > 0 %}
        RESPOND MSG="MIRROR mode activated"
    {% endif %}
    {% if idxvars.debug_level|int > 1 %}
        RESPOND MSG="T0 start position: {T0_START}"
        RESPOND MSG="T1 start position: {T1_START}"
    {% endif %}

    SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
    G0 X{T0_START} Y{idxvars.copy_start_y} Z{idxvars.copy_start_z} F{idxvars.feedrate}

    {% if idxvars.toolhead_led %}
        STATUS_PRINTING
    {% endif %}

    SET_DUAL_CARRIAGE CARRIAGE=1 MODE=PRIMARY
    G0 X{T1_START} F{idxvars.feedrate}

    {% if idxvars.toolhead_led %}
        STATUS_PRINTING
    {% endif %}

    SET_DUAL_CARRIAGE CARRIAGE=1 MODE=MIRROR
    SYNC_EXTRUDER_MOTION EXTRUDER=extruder1 MOTION_QUEUE=extruder

    {% if idxvars.debug_level|int > 1 %}
        RESPOND MSG="Tool head 1 set to MIRROR with extruder motion queue set."
    {% endif %}


#####################################################################
#   Offset persistence — load from save_variables at startup
#   Uses Klippain's existing [save_variables] section
#####################################################################

[delayed_gcode _LOAD_OFFSETS_FROM_DISK]
initial_duration: 3.0
gcode:
    {% set svv = printer.save_variables.variables %}
    SET_GCODE_VARIABLE MACRO=IDEX_VARS VARIABLE=offset_x VALUE={svv.t1_offset_x|float}
    SET_GCODE_VARIABLE MACRO=IDEX_VARS VARIABLE=offset_y VALUE={svv.t1_offset_y|float}
    SET_GCODE_VARIABLE MACRO=IDEX_VARS VARIABLE=offset_z VALUE={svv.t1_offset_z|float}
    SET_GCODE_VARIABLE MACRO=IDEX_VARS VARIABLE=park_distance_t0 VALUE={svv.park_distance_t0|float}
    SET_GCODE_VARIABLE MACRO=IDEX_VARS VARIABLE=park_distance_t1 VALUE={svv.park_distance_t1|float}

    {% set tool_change = svv.preferred_tool_change|upper %}
    {% if tool_change == "SWAP" %}
        SET_GCODE_VARIABLE MACRO=IDEX_VARS VARIABLE=swap_toolheads VALUE=1
        SET_GCODE_VARIABLE MACRO=IDEX_VARS VARIABLE=immediate_move VALUE=1
    {% elif tool_change == "OOZE_PREV" %}
        SET_GCODE_VARIABLE MACRO=IDEX_VARS VARIABLE=swap_toolheads VALUE=0
        SET_GCODE_VARIABLE MACRO=IDEX_VARS VARIABLE=immediate_move VALUE=0
    {% else %}
        SET_GCODE_VARIABLE MACRO=IDEX_VARS VARIABLE=swap_toolheads VALUE=0
        SET_GCODE_VARIABLE MACRO=IDEX_VARS VARIABLE=immediate_move VALUE=1
    {% endif %}

    UPDATE_DELAYED_GCODE ID=_LOAD_OFFSETS_FROM_DISK DURATION=0


#####################################################################
#   Writes current offsets to the console
#####################################################################

[gcode_macro DISPLAY_CURRENT_OFFSETS]
gcode:
    {% set idxvars = printer["gcode_macro IDEX_VARS"] %}
    RESPOND MSG="T1 Z offset is at {idxvars.offset_z}"
    RESPOND MSG="T1 Y offset is at {idxvars.offset_y}"
    RESPOND MSG="T1 X offset is at {idxvars.offset_x}"


#####################################################################
#   Saves the current gcode offsets to disk to keep them
#   consistent across restarts.
#####################################################################

[gcode_macro SAVE_OFFSETS_TO_DISK]
description: Saves the current T1 offsets to the disk for restarts
gcode:
    {% set idxvars = printer["gcode_macro IDEX_VARS"] %}
    SAVE_VARIABLE VARIABLE=t1_offset_x VALUE={idxvars.offset_x|float|round(3)}
    SAVE_VARIABLE VARIABLE=t1_offset_y VALUE={idxvars.offset_y|float|round(3)}
    SAVE_VARIABLE VARIABLE=t1_offset_z VALUE={idxvars.offset_z|float|round(3)}
    SAVE_VARIABLE VARIABLE=park_distance_t0 VALUE={idxvars.park_distance_t0|float|round(3)}
    SAVE_VARIABLE VARIABLE=park_distance_t1 VALUE={idxvars.park_distance_t1|float|round(3)}


#####################################################################
