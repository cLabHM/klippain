#####################################################################
#
#  Klippain IDEX Core Macros for Tridex
#
#  Adapted for Klippain modular framework.
#  Based on Tridex RC2 macros by Joseph Greiner (GPL v3).
#  Merged with Klippain conventions by AI — REVIEW BEFORE USE.
#
#  All variables reference [gcode_macro _USER_VARIABLES] as per
#  Klippain convention. The matching variables must exist in your
#  variables.cfg (they already do if you used the Tridex template).
#
#  IMPORTANT — before using this file you must:
#    1. Comment out line 49 in config/hardware/extruder/galileo2_Tridex.cfg:
#       # [include ../../../macros/helpers/hotend_heater_ctrl.cfg]
#       (This file's M109 override replaces it with merged logic.)
#    2. Add IDEX variables to your save_variables.cfg (see bottom of this file).
#    3. Add [include ../macros/idex/*.cfg] to config/machine.cfg
#
#  WARNING: These macros control physical toolhead movement.
#  Test with debug_level=2, low speeds, and finger on the e-stop.
#
#####################################################################


#####################################################################
#   T0 / T1 — Slicer tool change entry points
#####################################################################

[gcode_macro T0]
variable_color: ""
gcode:
    {% set uvars = printer["gcode_macro _USER_VARIABLES"] %}
    {% if printer.dual_carriage is defined %}
        {% if printer.dual_carriage.carriage_0 == "INACTIVE" %}
            {% if uvars.debug_level|int > 0 %}
                RESPOND MSG="T0 called — activating carriage 0."
            {% endif %}
            _TOOL_CHANGE T=0
        {% else %}
            {% if uvars.debug_level|int > 1 %}
                RESPOND MSG="T0 called — carriage 0 already active."
            {% endif %}
        {% endif %}
        _UPDATE_GUI_COLOR_VAR T=0
    {% endif %}

[gcode_macro T1]
variable_color: ""
gcode:
    {% set uvars = printer["gcode_macro _USER_VARIABLES"] %}
    {% if printer.dual_carriage is defined %}
        {% if printer.dual_carriage.carriage_1 == "INACTIVE" %}
            {% if uvars.debug_level|int > 0 %}
                RESPOND MSG="T1 called — activating carriage 1."
            {% endif %}
            _TOOL_CHANGE T=1
        {% else %}
            {% if uvars.debug_level|int > 1 %}
                RESPOND MSG="T1 called — carriage 1 already active."
            {% endif %}
        {% endif %}
        _UPDATE_GUI_COLOR_VAR T=1
    {% endif %}


#####################################################################
#   _UPDATE_GUI_COLOR_VAR
#   Updates Mainsail button colour for the active tool
#####################################################################

[gcode_macro _UPDATE_GUI_COLOR_VAR]
gcode:
    {% set uvars = printer["gcode_macro _USER_VARIABLES"] %}
    {% set prev = uvars.active_tool|int %}
    {% set next = params.T|default(0)|int %}
    SET_GCODE_VARIABLE MACRO=T{prev} VARIABLE=color VALUE="''"
    SET_GCODE_VARIABLE MACRO=T{next} VARIABLE=color VALUE="'{uvars.active_tool_color|string}'"
    SET_GCODE_VARIABLE MACRO=_USER_VARIABLES VARIABLE=active_tool VALUE={next}


#####################################################################
#   _TOOL_CHANGE
#   Core tool-change logic — dispatches to SWAP or CLASSIC
#####################################################################

[gcode_macro _TOOL_CHANGE]
gcode:
    {% set uvars = printer["gcode_macro _USER_VARIABLES"] %}
    {% set tweaked_z_offset = printer.gcode_move.homing_origin.z|round(3)|float %}
    {% set tool = params.T|default(0)|int %}
    M400

    {% if printer.dual_carriage is defined %}
        # --- NOT HOMED: just switch extruder/carriage, no moves ---
        {% if "xyz" not in printer.toolhead.homed_axes %}
            {% if tool == 0 %}
                {% if printer.dual_carriage.carriage_0 == "INACTIVE" %}
                    SET_GCODE_OFFSET X=0 Y=0 Z={(tweaked_z_offset - uvars.offset_z)|round(3)} MOVE=0
                {% endif %}
                ACTIVATE_EXTRUDER EXTRUDER=extruder
                SET_DUAL_CARRIAGE CARRIAGE=0
            {% elif tool == 1 %}
                {% if printer.dual_carriage.carriage_0 == "INACTIVE" %}
                    SET_GCODE_OFFSET X={uvars.offset_x} Y={uvars.offset_y} Z={(tweaked_z_offset + uvars.offset_z)|round(3)} MOVE=0
                {% endif %}
                ACTIVATE_EXTRUDER EXTRUDER=extruder1
                SET_DUAL_CARRIAGE CARRIAGE=1
            {% else %}
                RESPOND MSG="Unhandled Tool T{tool}."
            {% endif %}
            {% if uvars.debug_level|int > 1 %}
                RESPOND MSG="Toolchange pre-homing: T{tool} activated (no moves)."
            {% endif %}

        # --- HOMED: full tool change with movement ---
        {% else %}
            # Z hop up
            {% if uvars.z_hop|float > 0.0 %}
                _TOOL_CHANGE_Z_HOP DIR="UP"
            {% endif %}

            # Dispatch: SWAP or CLASSIC
            {% if uvars.swap_toolheads == 1 %}
                {% if uvars.debug_level|int > 0 %}
                    RESPOND MSG="Toolchange — SWAP mode."
                {% endif %}
                _SWAP_TOOL
            {% else %}
                {% if uvars.debug_level|int > 0 %}
                    RESPOND MSG="Toolchange — CLASSIC mode."
                {% endif %}
                {% if uvars.autopark == 1 %}
                    SAVE_GCODE_STATE NAME=toolhead_state
                    _PARK_TOOL
                {% endif %}

                {% if tool == 0 %}
                    ACTIVATE_EXTRUDER EXTRUDER=extruder
                    SET_DUAL_CARRIAGE CARRIAGE=0
                {% elif tool == 1 %}
                    ACTIVATE_EXTRUDER EXTRUDER=extruder1
                    SET_DUAL_CARRIAGE CARRIAGE=1
                {% else %}
                    RESPOND MSG="Unhandled Tool T{tool}."
                {% endif %}

                {% if uvars.debug_level|int > 1 %}
                    RESPOND MSG="Toolchange — T{tool} carriage and extruder activated."
                {% endif %}

                # Nozzle scrub (CLASSIC / OOZE_PREV only)
                {% if uvars.scrub|int == 1 %}
                    _NOZZLE_SCRUB
                {% endif %}

                {% if uvars.autopark == 1 %}
                    RESTORE_GCODE_STATE NAME=toolhead_state MOVE={uvars.immediate_move} MOVE_SPEED={uvars.feedrate|int / 60}
                {% endif %}
            {% endif %}

            # --- Apply gcode offsets for the now-active tool ---
            {% if tool == 0 %}
                {% if tweaked_z_offset == 0 %}
                    SET_GCODE_OFFSET X=0 Y=0 Z=0 MOVE=1
                {% else %}
                    SET_GCODE_OFFSET X=0 Y=0 Z={(tweaked_z_offset - uvars.offset_z)|round(3)} MOVE={uvars.immediate_move}
                {% endif %}
                {% if uvars.debug_level|int > 1 %}
                    RESPOND MSG="Offsets cleared for T0."
                {% endif %}
            {% elif tool == 1 %}
                {% if ((tweaked_z_offset + uvars.offset_z)|round(3)) == 0 %}
                    {% set tweaked_z_offset = tweaked_z_offset + 0.000001 %}
                {% endif %}
                SET_GCODE_OFFSET X={uvars.offset_x} Y={uvars.offset_y} Z={(tweaked_z_offset + uvars.offset_z)|round(3)} MOVE={uvars.immediate_move}
                {% if uvars.debug_level|int > 1 %}
                    RESPOND MSG="Offsets applied for T1: X={uvars.offset_x} Y={uvars.offset_y} Z={(tweaked_z_offset + uvars.offset_z)|round(3)}"
                {% endif %}
            {% endif %}

            # Sync fan speeds
            _SET_PRINT_FANS_SPEED

            # Z hop down
            {% if uvars.z_hop|float > 0.0 %}
                _TOOL_CHANGE_Z_HOP DIR="DOWN"
            {% endif %}
        {% endif %}
    {% else %}
        RESPOND MSG="[dual_carriage] not defined — cannot change tool."
    {% endif %}


#####################################################################
#   _TOOL_CHANGE_Z_HOP
#####################################################################

[gcode_macro _TOOL_CHANGE_Z_HOP]
gcode:
    {% set uvars = printer["gcode_macro _USER_VARIABLES"] %}
    {% set direction = params.DIR|upper %}
    {% set max_z = printer.toolhead.axis_maximum.z|float %}
    {% set cur_z = printer.toolhead.position.z|float %}
    {% set z_safe = uvars.z_hop|float if cur_z < (max_z - uvars.z_hop|float) else (max_z - cur_z) %}

    {% if direction == "UP" %}
        G91
        G1 Z{z_safe}
        G90
    {% elif direction == "DOWN" %}
        G91
        G1 Z-{z_safe}
        G90
    {% endif %}


#####################################################################
#   _SWAP_TOOL
#   Simultaneous tool swap using Klipper COPY mode trick
#   Concept: Helge Keck — Implementation: Joseph Greiner
#####################################################################

[gcode_macro _SWAP_TOOL]
gcode:
    {% set uvars = printer["gcode_macro _USER_VARIABLES"] %}

    # Determine which tool we are swapping TO
    {% if printer.dual_carriage.carriage_0 == "INACTIVE" %}
        {% set swap_tool = 0 %}
    {% else %}
        {% set swap_tool = 1 %}
    {% endif %}

    _PARKING_DISTANCE_CHECK

    {% if uvars.park_distance_t1|float < uvars.offset_x|float %}
        {% set parking_distance = uvars.offset_x|float + 1 %}
    {% else %}
        {% set parking_distance = uvars.park_distance_t1|float %}
    {% endif %}

    M400
    # Calculate positions
    {% if swap_tool == 0 %}
        {% set t0_curr_pos = printer.configfile.config.stepper_x.position_endstop|float + uvars.park_distance_t0 %}
        {% set t1_curr_pos = printer.gcode_move.gcode_position.x|float %}
        {% set t0_new_x = t1_curr_pos %}
        {% set t1_new_x = printer.configfile.config.dual_carriage.position_max|float - uvars.park_distance_t1 %}
        {% set t0_distance = (t0_new_x - t0_curr_pos)|round(3) %}
        {% set t1_distance = (t1_new_x - t1_curr_pos)|round(3) %}
    {% elif swap_tool == 1 %}
        {% set t0_curr_pos = printer.gcode_move.gcode_position.x|float %}
        {% set t1_curr_pos = printer.configfile.config.dual_carriage.position_max|float - uvars.park_distance_t1 %}
        {% set t0_new_x = printer.configfile.config.stepper_x.position_endstop|float + uvars.park_distance_t0 %}
        {% set t1_new_x = t0_curr_pos %}
        {% set t0_distance = (t0_curr_pos - t0_new_x)|round(3) %}
        {% set t1_distance = (t1_curr_pos - t1_new_x)|round(3) %}
    {% endif %}

    {% if uvars.debug_level|int > 1 %}
        RESPOND MSG="SWAP: T0 {t0_curr_pos}->{t0_new_x} ({t0_distance}mm)  T1 {t1_curr_pos}->{t1_new_x} ({t1_distance}mm)"
    {% endif %}

    M400
    G90
    SAVE_GCODE_STATE NAME=swap_state

    # Use COPY mode to move both heads simultaneously,
    # then decouple and finish the longer move individually.
    {% if t0_distance|abs >= t1_distance|abs %}
        SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
        SET_DUAL_CARRIAGE CARRIAGE=1 MODE=COPY
        {% if swap_tool == 0 %}
            G0 X{t0_curr_pos + (t1_distance)} F{uvars.feedrate}
        {% elif swap_tool == 1 %}
            G0 X{t0_curr_pos - t1_distance} F{uvars.feedrate}
        {% endif %}
        # Decouple T1
        SET_DUAL_CARRIAGE CARRIAGE=1 MODE=PRIMARY
        ACTIVATE_EXTRUDER EXTRUDER=extruder1
        # Finish moving T0
        SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
        ACTIVATE_EXTRUDER EXTRUDER=extruder
        G0 X{t0_new_x} F{uvars.feedrate}
    {% elif t0_distance|abs < t1_distance|abs %}
        SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
        SET_DUAL_CARRIAGE CARRIAGE=1 MODE=COPY
        G0 X{t0_new_x} F{uvars.feedrate}
        # Decouple T1 and finish its move
        SET_DUAL_CARRIAGE CARRIAGE=1 MODE=PRIMARY
        ACTIVATE_EXTRUDER EXTRUDER=extruder1
        G0 X{t1_new_x} F{uvars.feedrate}
    {% endif %}

    # Activate the target tool
    {% if swap_tool == 0 %}
        SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
        ACTIVATE_EXTRUDER EXTRUDER=extruder
    {% elif swap_tool == 1 %}
        SET_DUAL_CARRIAGE CARRIAGE=1 MODE=PRIMARY
        ACTIVATE_EXTRUDER EXTRUDER=extruder1
    {% endif %}

    RESTORE_GCODE_STATE NAME=swap_state MOVE={uvars.immediate_move}


#####################################################################
#   _PARKING_DISTANCE_CHECK
#   Auto-adjusts park distance if X offset is too large
#####################################################################

[gcode_macro _PARKING_DISTANCE_CHECK]
gcode:
    {% set uvars = printer["gcode_macro _USER_VARIABLES"] %}
    {% if uvars.offset_x|float > uvars.park_distance_t1|float %}
        RESPOND MSG="X offset ({uvars.offset_x}) > park distance ({uvars.park_distance_t1}), auto-adjusting."
        SET_GCODE_VARIABLE MACRO=_USER_VARIABLES VARIABLE=park_distance_t1 VALUE={uvars.offset_x|float + 1}
        SAVE_OFFSETS_TO_DISK
    {% endif %}


#####################################################################
#   _PARK_TOOL
#   Parks the ACTIVE tool at its end of the X rail
#   (This is NOT the Klippain PARK macro — that one parks at a
#    user-defined XY position. This parks at the rail endpoint.)
#####################################################################

[gcode_macro _PARK_TOOL]
gcode:
    {% set uvars = printer["gcode_macro _USER_VARIABLES"] %}
    {% if printer.dual_carriage is defined %}
        SAVE_GCODE_STATE NAME=park_tool
        SET_GCODE_OFFSET X=0 Y=0 Z=0
        G90
        _PARKING_DISTANCE_CHECK

        {% if uvars.park_distance_t1|float < uvars.offset_x|float %}
            {% set parking_distance = uvars.park_distance_t1|float + 1 %}
        {% else %}
            {% set parking_distance = uvars.park_distance_t1|float %}
        {% endif %}

        {% if printer.toolhead.extruder == 'extruder' %}
            {% set XPOS = printer.configfile.config.stepper_x.position_endstop|float + uvars.park_distance_t0 %}
            {% if uvars.debug_level|int > 1 %}
                RESPOND MSG="Parking T0 at X={XPOS}"
            {% endif %}
            G1 X{XPOS} F{uvars.feedrate}
        {% elif printer.toolhead.extruder == 'extruder1' %}
            {% set XPOS = printer.configfile.config.dual_carriage.position_max|float - parking_distance %}
            {% if uvars.debug_level|int > 1 %}
                RESPOND MSG="Parking T1 at X={XPOS}"
            {% endif %}
            G1 X{XPOS} F{uvars.feedrate}
        {% else %}
            RESPOND TYPE=error MSG="Unknown extruder: {printer.toolhead.extruder}"
        {% endif %}

        RESTORE_GCODE_STATE NAME=park_tool
    {% endif %}


#####################################################################
#   _NOZZLE_SCRUB
#   Scrubs nozzle against wiper area near parking position
#####################################################################

[gcode_macro _NOZZLE_SCRUB]
gcode:
    {% set uvars = printer["gcode_macro _USER_VARIABLES"] %}
    {% if printer.dual_carriage is defined and printer.toolhead.extruder in ['extruder', 'extruder1'] %}
        {% set MIN = 1 %}
        {% set MAX = 20.0 %}
        {% set T0_MIN = printer.configfile.config.stepper_x.position_min|float + uvars.park_distance_t0 %}
        {% set T1_MIN = printer.configfile.config.dual_carriage.position_max|float - uvars.park_distance_t1 %}

        {% if printer.toolhead.extruder == 'extruder' %}
            {% set TEMP = printer.extruder.temperature %}
            {% set XMAX = T0_MIN %}
            {% set XPOS = T0_MIN + MIN|float %}
            {% set XPOS1 = T0_MIN + MAX|float %}
        {% else %}
            {% set TEMP = printer.extruder1.temperature %}
            {% set XMAX = T1_MIN %}
            {% set XPOS = T1_MIN - MIN|float %}
            {% set XPOS1 = T1_MIN - MAX|float %}
        {% endif %}

        {% if TEMP >= uvars.purge_temp_min %}
            G90
            G1 X{XMAX} F{uvars.prep_spd_xy}
            M83
            G1 E{uvars.purge_length} F{uvars.purge_spd}
            G1 E-{uvars.purge_ret} F{uvars.purge_spd * 5}
            G90
            G1 X{XPOS} F{uvars.prep_spd_xy}
            G4 P{uvars.ooze_dwell * 1000}
            G92 E0
            G90
            G1 X{XPOS1} F{uvars.prep_spd_xy}
            {% for i in range(uvars.scrubs) %}
                G1 X{XPOS} F{uvars.feedrate}
                G1 X{XPOS1} F{uvars.feedrate}
            {% endfor %}
            G1 X{XPOS} F{uvars.prep_spd_xy}
        {% else %}
            {% if uvars.debug_level|int > 1 %}
                RESPOND MSG="Nozzle too cold to scrub ({TEMP}C < {uvars.purge_temp_min}C)."
            {% endif %}
        {% endif %}
        G90
    {% endif %}


#####################################################################
#   M106 / M107 — Print fan overrides for dual toolheads
#   Routes fan commands to the correct fan_generic instances
#####################################################################

[gcode_macro M106]
description: Override M106 for dual IDEX fan management.
gcode:
    {% set uvars = printer["gcode_macro _USER_VARIABLES"] %}
    {% set raw_speed = params.S|default(0)|float %}
    {% set fan_speed = (raw_speed / 255.0)|round(2) %}

    {% if params.P is defined %}
        {% set param_fan = params.P|int %}
        {% if param_fan == 0 %}
            SET_FAN_SPEED FAN={uvars.fan0} SPEED={fan_speed}
        {% elif param_fan == 1 %}
            SET_FAN_SPEED FAN={uvars.fan1} SPEED={fan_speed}
        {% else %}
            RESPOND MSG="M106: Unknown fan P{param_fan}."
        {% endif %}
    {% elif printer.dual_carriage is defined %}
        _SET_PRINT_FANS_SPEED SPEED={fan_speed}
    {% endif %}

[gcode_macro M107]
description: Override M107 for dual IDEX fan management.
gcode:
    M106 S0

[gcode_macro _SET_PRINT_FANS_SPEED]
gcode:
    {% set uvars = printer["gcode_macro _USER_VARIABLES"] %}
    {% if params.SPEED is defined %}
        {% set fan_speed = params.SPEED|float %}
    {% else %}
        {% set fan0_speed = printer["fan_generic " + uvars.fan0].speed|float %}
        {% set fan1_speed = printer["fan_generic " + uvars.fan1].speed|float %}
        {% set fan_speed = [fan0_speed, fan1_speed]|max %}
    {% endif %}
    SET_FAN_SPEED FAN={uvars.fan0} SPEED={fan_speed}
    SET_FAN_SPEED FAN={uvars.fan1} SPEED={fan_speed}


#####################################################################
#   M104 override — Sync extruder temps in COPY / MIRROR modes
#####################################################################

[gcode_macro M104]
rename_existing: M104.1
description: Override M104 for COPY/MIRROR temperature sync.
gcode:
    {% set uvars = printer["gcode_macro _USER_VARIABLES"] %}
    {% set set_temp = params.S|default(0)|int %}
    {% set set_tool = params.T|default(-1)|int %}

    # Clamp tool number
    {% if set_tool > 1 %}
        {% set set_tool = 1 %}
    {% endif %}

    {% if (printer.dual_carriage.carriage_1 == 'MIRROR') or (printer.dual_carriage.carriage_1 == 'COPY') %}
        # --- COPY / MIRROR mode: sync temperatures ---
        {% if set_tool == 1 %}
            M104.1 S{set_temp} T1
        {% else %}
            {% if set_temp == uvars.t0_copy_mirror_temp_print|int %}
                M104.1 S{uvars.t0_copy_mirror_temp_print} T0
                M104.1 S{uvars.t1_copy_mirror_temp_print} T1
            {% else %}
                M104.1 S{set_temp} T0
                {% if set_temp != uvars.t0_copy_mirror_temp_start|int %}
                    SET_GCODE_VARIABLE MACRO=_USER_VARIABLES VARIABLE=t0_copy_mirror_temp_print VALUE={set_temp}
                {% endif %}
            {% endif %}
        {% endif %}
    {% else %}
        # --- PRIMARY mode: route to correct extruder ---
        {% if set_tool == -1 %}
            {% if printer.toolhead.extruder == 'extruder1' %}
                {% set set_tool = 1 %}
            {% else %}
                {% set set_tool = 0 %}
            {% endif %}
        {% endif %}
        M104.1 S{set_temp} T{set_tool}
    {% endif %}


#####################################################################
#   M109 override — MERGED: Klippain temperature-settle fix
#   + IDEX COPY/MIRROR temperature sync
#
#   This REPLACES the Klippain hotend_heater_ctrl.cfg override.
#   You MUST comment out:
#     [include ../../../macros/helpers/hotend_heater_ctrl.cfg]
#   in config/hardware/extruder/galileo2_Tridex.cfg
#####################################################################

[gcode_macro M109]
rename_existing: M109.1
description: Override M109 — COPY/MIRROR sync + temperature settle fix.
gcode:
    {% set uvars = printer["gcode_macro _USER_VARIABLES"] %}
    {% set set_temp = params.S|default(0)|float %}
    {% set set_tool = params.T|default(-1)|int %}
    {% set fix_settle = uvars.fix_heaters_temperature_settle %}

    {% if set_tool > 1 %}
        {% set set_tool = 1 %}
    {% endif %}

    {% if (printer.dual_carriage.carriage_1 == 'MIRROR') or (printer.dual_carriage.carriage_1 == 'COPY') %}
        # --- COPY / MIRROR mode ---
        {% if set_tool == 1 %}
            M109.1 S{set_temp} T1
        {% else %}
            {% if set_temp|int == uvars.t0_copy_mirror_temp_print|int %}
                M109.1 S{uvars.t0_copy_mirror_temp_print} T0
                M109.1 S{uvars.t1_copy_mirror_temp_print} T1
            {% else %}
                M109.1 S{set_temp} T0
                {% if set_temp|int != uvars.t0_copy_mirror_temp_start|int %}
                    SET_GCODE_VARIABLE MACRO=_USER_VARIABLES VARIABLE=t0_copy_mirror_temp_print VALUE={set_temp|int}
                {% endif %}
            {% endif %}
        {% endif %}
    {% else %}
        # --- PRIMARY mode ---
        {% if set_tool == -1 %}
            {% if printer.toolhead.extruder == 'extruder1' %}
                {% set set_tool = 1 %}
            {% else %}
                {% set set_tool = 0 %}
            {% endif %}
        {% endif %}

        # Klippain temperature-settle fix for low-inertia hotends
        {% if fix_settle %}
            M104.1 S{set_temp} T{set_tool}
            {% if set_temp != 0 %}
                {% if set_tool == 0 %}
                    {% set actual = printer.extruder.temperature|float %}
                    {% if actual <= set_temp %}
                        TEMPERATURE_WAIT SENSOR=extruder MINIMUM={set_temp}
                    {% else %}
                        TEMPERATURE_WAIT SENSOR=extruder MAXIMUM={set_temp}
                    {% endif %}
                {% elif set_tool == 1 %}
                    {% set actual = printer.extruder1.temperature|float %}
                    {% if actual <= set_temp %}
                        TEMPERATURE_WAIT SENSOR=extruder1 MINIMUM={set_temp}
                    {% else %}
                        TEMPERATURE_WAIT SENSOR=extruder1 MAXIMUM={set_temp}
                    {% endif %}
                {% endif %}
            {% endif %}
        {% else %}
            M109.1 S{set_temp} T{set_tool}
        {% endif %}
    {% endif %}


#####################################################################
#   M605 — Printing mode selection (slicer interface)
#   S0 = full control (no autopark)
#   S1 = primary with autopark (default for IDEX prints)
#   S2/S5 = copy mode
#   S3/S6 = mirror mode
#####################################################################

[gcode_macro M605]
description: Set dual-carriage printing mode.
gcode:
    {% set mode = params.S|default(1)|int %}

    {% if mode == 0 %}
        SET_GCODE_VARIABLE MACRO=_USER_VARIABLES VARIABLE=autopark VALUE=0
        SET_DUAL_CARRIAGE CARRIAGE=1 MODE=PRIMARY
        SYNC_EXTRUDER_MOTION EXTRUDER=extruder1 MOTION_QUEUE=extruder1
        SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
    {% elif mode == 1 %}
        ACTIVATE_PRIMARY_MODE
    {% elif mode == 2 or mode == 5 %}
        ACTIVATE_COPY_MODE
    {% elif mode == 3 or mode == 6 %}
        ACTIVATE_MIRROR_MODE
    {% endif %}

    {% if mode == 5 or mode == 6 %}
        RESPOND MSG="Copy/Mirror with rafts — please set up rafts in your slicer."
    {% endif %}


#####################################################################
#   Printing mode activation macros
#####################################################################

[gcode_macro ACTIVATE_PRIMARY_MODE]
description: Set carriages for PRIMARY (dual-extrusion) mode.
gcode:
    SET_GCODE_VARIABLE MACRO=_USER_VARIABLES VARIABLE=autopark VALUE=1
    SET_DUAL_CARRIAGE CARRIAGE=1 MODE=PRIMARY
    SYNC_EXTRUDER_MOTION EXTRUDER=extruder1 MOTION_QUEUE=extruder1
    SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
    ACTIVATE_EXTRUDER EXTRUDER=extruder

[gcode_macro ACTIVATE_COPY_MODE]
description: Set carriages for COPY mode.
gcode:
    {% set uvars = printer["gcode_macro _USER_VARIABLES"] %}
    {% set T0_START = uvars.copy_start_x|float %}
    {% set T1_START = (printer.configfile.config.stepper_x.position_min|float + printer.configfile.config.dual_carriage.position_max|float) / 2 + T0_START %}

    SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
    G0 X{T0_START} Y{uvars.copy_start_y} Z{uvars.copy_start_z} F{uvars.feedrate}

    SET_DUAL_CARRIAGE CARRIAGE=1 MODE=PRIMARY
    G0 X{T1_START} F{uvars.feedrate}

    SET_DUAL_CARRIAGE CARRIAGE=1 MODE=COPY
    SYNC_EXTRUDER_MOTION EXTRUDER=extruder1 MOTION_QUEUE=extruder

[gcode_macro ACTIVATE_MIRROR_MODE]
description: Set carriages for MIRROR mode.
gcode:
    {% set uvars = printer["gcode_macro _USER_VARIABLES"] %}
    {% set T0_START = uvars.copy_start_x|float %}
    {% set T1_START = (printer.configfile.config.stepper_x.position_min|float + printer.configfile.config.dual_carriage.position_max|float) - T0_START %}

    SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
    G0 X{T0_START} Y{uvars.copy_start_y} Z{uvars.copy_start_z} F{uvars.feedrate}

    SET_DUAL_CARRIAGE CARRIAGE=1 MODE=PRIMARY
    G0 X{T1_START} F{uvars.feedrate}

    SET_DUAL_CARRIAGE CARRIAGE=1 MODE=MIRROR
    SYNC_EXTRUDER_MOTION EXTRUDER=extruder1 MOTION_QUEUE=extruder


#####################################################################
#   Offset persistence — load from save_variables at startup
#   Uses Klippain's existing [save_variables] section
#####################################################################

[delayed_gcode _LOAD_IDEX_OFFSETS]
initial_duration: 3.0
gcode:
    {% set svv = printer.save_variables.variables %}

    # Only load if the variables exist (first boot protection)
    {% if svv.t1_offset_x is defined %}
        SET_GCODE_VARIABLE MACRO=_USER_VARIABLES VARIABLE=offset_x VALUE={svv.t1_offset_x|float}
        SET_GCODE_VARIABLE MACRO=_USER_VARIABLES VARIABLE=offset_y VALUE={svv.t1_offset_y|float}
        SET_GCODE_VARIABLE MACRO=_USER_VARIABLES VARIABLE=offset_z VALUE={svv.t1_offset_z|float}
    {% endif %}

    {% if svv.park_distance_t0 is defined %}
        SET_GCODE_VARIABLE MACRO=_USER_VARIABLES VARIABLE=park_distance_t0 VALUE={svv.park_distance_t0|float}
        SET_GCODE_VARIABLE MACRO=_USER_VARIABLES VARIABLE=park_distance_t1 VALUE={svv.park_distance_t1|float}
    {% endif %}

    {% if svv.preferred_tool_change is defined %}
        {% set tool_change = svv.preferred_tool_change|upper %}
        {% if tool_change == "SWAP" %}
            SET_GCODE_VARIABLE MACRO=_USER_VARIABLES VARIABLE=swap_toolheads VALUE=1
            SET_GCODE_VARIABLE MACRO=_USER_VARIABLES VARIABLE=immediate_move VALUE=1
        {% elif tool_change == "OOZE_PREV" %}
            SET_GCODE_VARIABLE MACRO=_USER_VARIABLES VARIABLE=swap_toolheads VALUE=0
            SET_GCODE_VARIABLE MACRO=_USER_VARIABLES VARIABLE=immediate_move VALUE=0
        {% else %}
            SET_GCODE_VARIABLE MACRO=_USER_VARIABLES VARIABLE=swap_toolheads VALUE=0
            SET_GCODE_VARIABLE MACRO=_USER_VARIABLES VARIABLE=immediate_move VALUE=1
        {% endif %}
        RESPOND MSG="IDEX offsets loaded. Tool change mode: {tool_change}"
    {% else %}
        RESPOND MSG="IDEX offsets: no saved data found, using defaults."
    {% endif %}

    UPDATE_DELAYED_GCODE ID=_LOAD_IDEX_OFFSETS DURATION=0

[gcode_macro SAVE_OFFSETS_TO_DISK]
description: Save T1 offsets and parking distances to disk.
gcode:
    {% set uvars = printer["gcode_macro _USER_VARIABLES"] %}
    SAVE_VARIABLE VARIABLE=t1_offset_x VALUE={uvars.offset_x|float|round(3)}
    SAVE_VARIABLE VARIABLE=t1_offset_y VALUE={uvars.offset_y|float|round(3)}
    SAVE_VARIABLE VARIABLE=t1_offset_z VALUE={uvars.offset_z|float|round(3)}
    SAVE_VARIABLE VARIABLE=park_distance_t0 VALUE={uvars.park_distance_t0|float|round(3)}
    SAVE_VARIABLE VARIABLE=park_distance_t1 VALUE={uvars.park_distance_t1|float|round(3)}
    RESPOND MSG="IDEX offsets saved to disk."

[gcode_macro DISPLAY_CURRENT_OFFSETS]
description: Show current T1 XYZ offsets in console.
gcode:
    {% set uvars = printer["gcode_macro _USER_VARIABLES"] %}
    RESPOND MSG="T1 offsets — X:{uvars.offset_x}  Y:{uvars.offset_y}  Z:{uvars.offset_z}"


#####################################################################
#   Offset adjustment macros (for live calibration)
#   Each adjusts the variable, applies it if T1 is active,
#   and saves to disk.
#####################################################################

[gcode_macro X_OFFSET_ADJUST]
description: Adjust T1 X offset. Usage: X_OFFSET_ADJUST D=0.05 or D=-0.1
gcode:
    {% set uvars = printer["gcode_macro _USER_VARIABLES"] %}
    {% set delta = params.D|float %}
    {% set new_val = (uvars.offset_x + delta)|round(3) %}
    SET_GCODE_VARIABLE MACRO=_USER_VARIABLES VARIABLE=offset_x VALUE={new_val}
    RESPOND MSG="T1 X offset: {new_val}"
    {% if printer.dual_carriage.carriage_0 == "INACTIVE" %}
        SET_GCODE_OFFSET X_ADJUST={delta} MOVE=1
    {% endif %}
    SAVE_OFFSETS_TO_DISK

[gcode_macro Y_OFFSET_ADJUST]
description: Adjust T1 Y offset. Usage: Y_OFFSET_ADJUST D=0.05 or D=-0.1
gcode:
    {% set uvars = printer["gcode_macro _USER_VARIABLES"] %}
    {% set delta = params.D|float %}
    {% set new_val = (uvars.offset_y + delta)|round(3) %}
    SET_GCODE_VARIABLE MACRO=_USER_VARIABLES VARIABLE=offset_y VALUE={new_val}
    RESPOND MSG="T1 Y offset: {new_val}"
    {% if printer.dual_carriage.carriage_0 == "INACTIVE" %}
        SET_GCODE_OFFSET Y_ADJUST={delta} MOVE=1
    {% endif %}
    SAVE_OFFSETS_TO_DISK

[gcode_macro Z_OFFSET_ADJUST]
description: Adjust T1 Z offset. Usage: Z_OFFSET_ADJUST D=0.01 or D=-0.05
gcode:
    {% set uvars = printer["gcode_macro _USER_VARIABLES"] %}
    {% set delta = params.D|float %}
    {% set new_val = (uvars.offset_z + delta)|round(3) %}
    SET_GCODE_VARIABLE MACRO=_USER_VARIABLES VARIABLE=offset_z VALUE={new_val}
    RESPOND MSG="T1 Z offset: {new_val}"
    {% if printer.dual_carriage.carriage_0 == "INACTIVE" %}
        SET_GCODE_OFFSET Z_ADJUST={delta} MOVE=1
    {% endif %}
    SAVE_OFFSETS_TO_DISK


