#####################################################################
#
#   SETUP INSTRUCTIONS
#
#   1. Place this file at: macros/idex/idex_core.cfg
#
#   2. In config/machine.cfg, add this line alongside the other
#      macro includes:
#        [include ../macros/idex/*.cfg]
#
#   3. In config/hardware/extruder/galileo2_Tridex.cfg, COMMENT OUT
#      line 49:
#        # [include ../../../macros/helpers/hotend_heater_ctrl.cfg]
#      (This file replaces that M109 override with a merged version.)
#
#   4. Add these lines to your save_variables.cfg file
#      (~/printer_data/config/save_variables.cfg):
#
#        t1_offset_x = 0.0
#        t1_offset_y = 0.0
#        t1_offset_z = 0.0
#        park_distance_t0 = 3.0
#        park_distance_t1 = 3.0
#        preferred_tool_change = 'CLASSIC'
#
#   5. FIRST TEST PROCEDURE (do this before printing):
#      a. Set debug_level: 2 in IDEX_VARS above
#      b. Restart Klipper
#      c. Home: G28
#      d. Check console for "IDEX offsets loaded"
#      e. Try: T1 (should park T0, activate T1)
#      f. Try: T0 (should park T1, activate T0)
#      g. Check: DISPLAY_CURRENT_OFFSETS
#      h. Verify both tools park without crashing
#
#####################################################################
