#####################################################################
#
#  IDEX Print Start / End Macros for Tridex (hybrid_corexy)
#
#  Provides:
#      PRINT_START  — IDEX-aware start routine (called by OrcaSlicer)
#      PRINT_END    — IDEX-aware end routine
#      _SET_TOOL_CHANGE_OPTIONS  — sets swap/immediate_move flags
#      _PREPARE_PRINTER_FOR_PURGE — sets offsets + calls PURGE_TOOL
#      PURGE_TOOL   — purge lines at bed edge for T0 or T1
#
#  OrcaSlicer machine start gcode — paste this exactly:
#
#      M190 S{bed_temperature[current_extruder]}
#      {if(is_extruder_used[0])}M104 S150 T0{endif}
#      {if(is_extruder_used[1])}M104 S150 T1{endif}
#      PRINT_START PRINT_MODE="PRIMARY" BED_TEMP={bed_temperature[current_extruder]} T0_STARTING_TEMP={if(is_extruder_used[0])}{first_layer_temperature[0]}{else}0{endif} T1_STARTING_TEMP={if(is_extruder_used[1])}{first_layer_temperature[1]}{else}0{endif} OOZE_PREV={ooze_prevention} INITIAL_TOOL={initial_extruder} CHAMBER_TEMP={chamber_temperature[initial_extruder]} SIZE={first_layer_print_min[0]}_{first_layer_print_min[1]}_{first_layer_print_max[0]}_{first_layer_print_max[1]}
#
#  OrcaSlicer machine end gcode:
#      PRINT_END
#
#####################################################################


#####################################################################
#   _CLIENT_VARIABLE
#   Overrides Mainsail's PAUSE park position — required for
#   COPY / MIRROR modes where T1 cannot reach T0's default park.
#   Uncomment if using Mainsail. For Fluidd, edit fluidd.cfg directly.
#####################################################################

# [gcode_macro _CLIENT_VARIABLE]
# variable_use_custom_pos   : True
# variable_custom_park_x    : 30
# variable_custom_park_y    : 30
# variable_custom_park_dz   : 2.0
# variable_retract          : 1.0
# variable_cancel_retract   : 5.0
# variable_speed_retract    : 35.0
# variable_unretract        : 1.0
# variable_speed_unretract  : 35.0
# variable_speed_hop        : 15.0
# variable_speed_move       : 100.0
# variable_park_at_cancel   : True
# variable_park_at_cancel_x : None
# variable_park_at_cancel_y : None
# gcode:


#####################################################################
#   PRINT_START
#####################################################################

[gcode_macro PRINT_START]
description: IDEX-aware start routine. Called by OrcaSlicer machine start gcode.
gcode:
    # --- Parameters from the slicer ---
    {% set bed_temp        = params.BED_TEMP|default(60)|int %}
    {% set t0_start_temp   = params.T0_STARTING_TEMP|default(0)|int %}
    {% set t1_start_temp   = params.T1_STARTING_TEMP|default(0)|int %}
    {% set print_mode      = params.PRINT_MODE|upper|default("PRIMARY") %}
    {% set ooze_prev       = params.OOZE_PREV|upper|default("FALSE") %}
    {% set initial_tool    = params.INITIAL_TOOL|default(0)|int %}
    {% set chamber_temp    = params.CHAMBER_TEMP|default(0)|int %}
    {% set fl_size         = params.SIZE|default("0_0_0_0")|string %}
    # COPY/MIRROR only
    {% set t0_print_temp   = params.T0_PRINTING_TEMP|default(t0_start_temp)|int %}
    {% set t1_print_temp   = params.T1_PRINTING_TEMP|default(t1_start_temp)|int %}

    {% set idxvars = printer["gcode_macro IDEX_VARS"] %}
    {% set uservars = printer["gcode_macro _USER_VARIABLES"] %}
    {% set verbose = uservars.verbose %}

    {% if verbose %}
        RESPOND MSG="PRINT_START: mode={print_mode} T0={t0_start_temp} T1={t1_start_temp} bed={bed_temp} initial_tool={initial_tool}"
    {% endif %}

    # --- Apply user tool-change preference (or ooze_prev override) ---
    _SET_TOOL_CHANGE_OPTIONS OOZE={ooze_prev}

    # --- Store COPY/MIRROR print temperatures in IDEX_VARS ---
    {% if print_mode == "COPY" or print_mode == "MIRROR" %}
        SET_GCODE_VARIABLE MACRO=IDEX_VARS VARIABLE=t0_copy_mirror_temp_start VALUE={t0_start_temp}
        SET_GCODE_VARIABLE MACRO=IDEX_VARS VARIABLE=t1_copy_mirror_temp_start VALUE={t1_start_temp}
        SET_GCODE_VARIABLE MACRO=IDEX_VARS VARIABLE=t0_copy_mirror_temp_print VALUE={t0_print_temp}
        SET_GCODE_VARIABLE MACRO=IDEX_VARS VARIABLE=t1_copy_mirror_temp_print VALUE={t1_print_temp}
    {% endif %}

    # --- T0 must always reach 150°C — TAP probe is on T0 and is used for every print ---
    # For T1-only prints T0 is still needed for Z homing, then cooled off afterwards.
    SET_HEATER_TEMPERATURE HEATER=extruder TARGET=150
    {% if t1_start_temp > 0 %}
        SET_HEATER_TEMPERATURE HEATER=extruder1 TARGET=150
    {% endif %}

    # --- Exit COPY/MIRROR mode from previous print if needed ---
    {% if printer.dual_carriage.carriage_1 == "COPY" or printer.dual_carriage.carriage_1 == "MIRROR" %}
        SET_DUAL_CARRIAGE CARRIAGE=1 MODE=PRIMARY
        SYNC_EXTRUDER_MOTION EXTRUDER=extruder1 MOTION_QUEUE=extruder1
    {% endif %}

    # --- Ensure T0 is active (TAP needs T0 for homing/probing) ---
    {% if printer.dual_carriage.carriage_0 == "INACTIVE" %}
        T0
    {% endif %}

    # --- Misc start setup ---
    CLEAR_PAUSE
    BED_MESH_CLEAR
    SET_GCODE_OFFSET Z=0
    M221 S100
    M220 S100
    G90
    M83

    # --- Wait for bed temperature (slicer already started it with M190) ---
    {% if verbose %}
        RESPOND MSG="PRINT_START: waiting for bed temp {bed_temp}°C"
    {% endif %}
    M190 S{bed_temp}

    # --- Chamber soak ---
    {% if chamber_temp > 0 %}
        {% set chamber_sensor_enabled = uservars.chamber_temperature_sensor_enabled %}
        {% if chamber_sensor_enabled %}
            {% set chamber_sensor_name = uservars.chamber_temperature_sensor_name %}
            {% if printer["temperature_sensor " ~ chamber_sensor_name].temperature|float < chamber_temp %}
                {% if verbose %}
                    RESPOND MSG="PRINT_START: waiting for chamber temp {chamber_temp}°C"
                {% endif %}
                HEATSOAK_CHAMBER TEMP={chamber_temp} MAXTIME={uservars.print_default_chamber_max_heating_time}
            {% endif %}
        {% endif %}
    {% endif %}

    # --- Wait for T0 safe temp before probing (TAP requirement) ---
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM=150

    # --- Home (conditional — skip if already homed) ---
    _CG28

    # --- Z tilt adjust ---
    {% if verbose %}
        RESPOND MSG="PRINT_START: Z tilt calibration"
    {% endif %}
    _TILT_CALIBRATE

    # --- Z homing with TAP ---
    {% if verbose %}
        RESPOND MSG="PRINT_START: G28 Z with Voron TAP"
    {% endif %}
    G28 Z

    # --- Adaptive bed mesh (PRIMARY only; COPY/MIRROR use full mesh or none) ---
    {% if print_mode == "PRIMARY" %}
        {% if verbose %}
            RESPOND MSG="PRINT_START: adaptive bed mesh SIZE={fl_size}"
        {% endif %}
        ADAPTIVE_BED_MESH SIZE={fl_size}
    {% else %}
        {% if verbose %}
            RESPOND MSG="PRINT_START: skipping bed mesh for {print_mode} mode"
        {% endif %}
        BED_MESH_CLEAR
    {% endif %}

    # --- Validate COPY/MIRROR gcode (must be T0-based) ---
    {% if print_mode == "COPY" or print_mode == "MIRROR" %}
        {% if t0_start_temp <= 160 %}
            RESPOND TYPE=error MSG="PRINT_START ERROR: COPY/MIRROR mode requires T0-based gcode (T0 temp must be > 160). Aborting."
            TURN_OFF_HEATERS
            M140 S0
            { action_raise_error("COPY/MIRROR mode: invalid gcode — must be sliced for T0.") }
        {% endif %}
    {% endif %}

    # --- Park T0 before final heat-up ---
    _PARK_TOOL

    # --- Heat to printing temperatures ---
    {% if t0_start_temp > 160 %}
        M104 S{t0_start_temp} T0
    {% else %}
        M104 S0 T0
    {% endif %}
    {% if t1_start_temp > 160 %}
        M104 S{t1_start_temp} T1
    {% else %}
        M104 S0 T1
    {% endif %}

    # Wait for T1 first (while T0 is also heating), then wait for T0.
    {% if t1_start_temp > 160 %}
        SET_DUAL_CARRIAGE CARRIAGE=1 MODE=PRIMARY
        ACTIVATE_EXTRUDER EXTRUDER=extruder1
        M109 S{t1_start_temp} T1
        SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
        ACTIVATE_EXTRUDER EXTRUDER=extruder
    {% endif %}
    {% if t0_start_temp > 160 %}
        M109 S{t0_start_temp} T0
    {% endif %}

    # --- Activate print mode ---
    {% if print_mode == "COPY" %}
        M605 S2
    {% elif print_mode == "MIRROR" %}
        M605 S3
    {% else %}
        M605 S1
    {% endif %}

    # --- Grab current z offset (includes any babystepping) ---
    {% set tweaked_z_offset = printer.gcode_move.homing_origin.z|float|round(3) %}

    {% if verbose %}
        RESPOND MSG="PRINT_START: preparing for purge. T0={t0_start_temp} T1={t1_start_temp} mode={print_mode} initial_tool={initial_tool}"
    {% endif %}

    # --- Purge and set offsets for the initial tool ---
    _PREPARE_PRINTER_FOR_PURGE T0_START_T={t0_start_temp} T1_START_T={t1_start_temp} P_MODE={print_mode} I_TOOL={initial_tool} TWEAKED_Z={tweaked_z_offset}

    # --- Ooze prevention: drop back to standby, slicer will re-heat via M109 ---
    {% if ooze_prev == "TRUE" %}
        M104 S{t0_start_temp} T0
        {% if t1_start_temp > 160 %}
            M104 S{t1_start_temp} T1
        {% endif %}
        _PARK_TOOL
    {% endif %}

    G92 E0.0

    {% if verbose %}
        RESPOND MSG="PRINT_START: ready to print!"
    {% endif %}


#####################################################################
#   _SET_TOOL_CHANGE_OPTIONS
#####################################################################

[gcode_macro _SET_TOOL_CHANGE_OPTIONS]
description: Sets swap_toolheads and immediate_move flags based on OOZE and preferred_tool_change.
gcode:
    {% set idxvars = printer["gcode_macro IDEX_VARS"] %}
    {% set svv = printer.save_variables.variables %}
    {% set m_ooze = params.OOZE|upper|default("FALSE") %}

    {% if m_ooze == "TRUE" %}
        SET_GCODE_VARIABLE MACRO=IDEX_VARS VARIABLE=swap_toolheads VALUE=0
        SET_GCODE_VARIABLE MACRO=IDEX_VARS VARIABLE=immediate_move VALUE=0
    {% else %}
        {% set tool_change = svv.preferred_tool_change|default("CLASSIC")|upper %}
        {% if tool_change == "SWAP" %}
            SET_GCODE_VARIABLE MACRO=IDEX_VARS VARIABLE=swap_toolheads VALUE=1
            SET_GCODE_VARIABLE MACRO=IDEX_VARS VARIABLE=immediate_move VALUE=1
        {% elif tool_change == "OOZE_PREV" %}
            SET_GCODE_VARIABLE MACRO=IDEX_VARS VARIABLE=swap_toolheads VALUE=0
            SET_GCODE_VARIABLE MACRO=IDEX_VARS VARIABLE=immediate_move VALUE=0
        {% else %}
            # CLASSIC (default)
            SET_GCODE_VARIABLE MACRO=IDEX_VARS VARIABLE=swap_toolheads VALUE=0
            SET_GCODE_VARIABLE MACRO=IDEX_VARS VARIABLE=immediate_move VALUE=1
        {% endif %}
    {% endif %}


#####################################################################
#   _PREPARE_PRINTER_FOR_PURGE
#####################################################################

[gcode_macro _PREPARE_PRINTER_FOR_PURGE]
description: Sets tool offsets and calls PURGE_TOOL for the correct combination of active tools.
gcode:
    {% set idxvars = printer["gcode_macro IDEX_VARS"] %}
    {% set t0_start_temp   = params.T0_START_T|int %}
    {% set t1_start_temp   = params.T1_START_T|int %}
    {% set print_mode      = params.P_MODE|upper %}
    {% set initial_tool    = params.I_TOOL|int %}
    {% set tweaked_z_offset = params.TWEAKED_Z|float %}

    # COPY or MIRROR mode: purge T0 (both nozzles move together)
    {% if print_mode == "COPY" or print_mode == "MIRROR" %}
        PURGE_TOOL T=0
    {% endif %}

    # T0 only
    {% if t0_start_temp > 160 and t1_start_temp <= 160 %}
        PURGE_TOOL T=0
    {% endif %}

    # T1 only
    {% if t0_start_temp <= 160 and t1_start_temp > 160 %}
        SET_DUAL_CARRIAGE CARRIAGE=1 MODE=PRIMARY
        ACTIVATE_EXTRUDER EXTRUDER=extruder1
        SET_GCODE_OFFSET X={idxvars.offset_x} Y={idxvars.offset_y} Z={tweaked_z_offset + idxvars.offset_z|float|round(6)} MOVE=0
        PURGE_TOOL T=1
    {% endif %}

    # Both T0 and T1 in PRIMARY mode
    {% if t0_start_temp > 160 and t1_start_temp > 160 and print_mode == "PRIMARY" %}
        {% if idxvars.offset_z|abs|float|round(3) <= 0.050 %}
            # Z offsets are hardware-aligned — purge both simultaneously in MIRROR mode
            SET_DUAL_CARRIAGE CARRIAGE=1 MODE=MIRROR
            SYNC_EXTRUDER_MOTION EXTRUDER=extruder1 MOTION_QUEUE=extruder
            PURGE_TOOL T=0
            SET_DUAL_CARRIAGE CARRIAGE=1 MODE=PRIMARY
            SYNC_EXTRUDER_MOTION EXTRUDER=extruder1 MOTION_QUEUE=extruder1
            # Activate initial tool
            {% if initial_tool == 0 %}
                SET_DUAL_CARRIAGE CARRIAGE=1 MODE=PRIMARY
                ACTIVATE_EXTRUDER EXTRUDER=extruder1
                _PARK_TOOL
                SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
                ACTIVATE_EXTRUDER EXTRUDER=extruder
                SET_GCODE_OFFSET X=0 Y=0 Z={tweaked_z_offset} MOVE=1
            {% else %}
                SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
                ACTIVATE_EXTRUDER EXTRUDER=extruder
                _PARK_TOOL
                SET_DUAL_CARRIAGE CARRIAGE=1 MODE=PRIMARY
                ACTIVATE_EXTRUDER EXTRUDER=extruder1
                SET_GCODE_OFFSET X={idxvars.offset_x} Y={idxvars.offset_y} Z={tweaked_z_offset + idxvars.offset_z|float|round(6)} MOVE=0
            {% endif %}
        {% else %}
            # Software Z offset set — purge non-initial tool first, initial tool last
            {% if initial_tool == 0 %}
                # Purge T1 first
                SET_DUAL_CARRIAGE CARRIAGE=1 MODE=PRIMARY
                ACTIVATE_EXTRUDER EXTRUDER=extruder1
                SET_GCODE_OFFSET X={idxvars.offset_x} Y={idxvars.offset_y} Z={tweaked_z_offset + idxvars.offset_z|float|round(6)} MOVE=0
                PURGE_TOOL T=1
                _NOZZLE_SCRUB
                _PARK_TOOL
                # Then purge T0
                SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
                ACTIVATE_EXTRUDER EXTRUDER=extruder
                SET_GCODE_OFFSET X=0 Y=0 Z={tweaked_z_offset|round(3)} MOVE=1
                PURGE_TOOL T=0
            {% else %}
                # Purge T0 first
                SET_DUAL_CARRIAGE CARRIAGE=0 MODE=PRIMARY
                ACTIVATE_EXTRUDER EXTRUDER=extruder
                SET_GCODE_OFFSET X=0 Y=0 Z={tweaked_z_offset|round(3)} MOVE=1
                PURGE_TOOL T=0
                _NOZZLE_SCRUB
                _PARK_TOOL
                # Then purge T1
                SET_DUAL_CARRIAGE CARRIAGE=1 MODE=PRIMARY
                ACTIVATE_EXTRUDER EXTRUDER=extruder1
                SET_GCODE_OFFSET X={idxvars.offset_x} Y={idxvars.offset_y} Z={tweaked_z_offset + idxvars.offset_z|float|round(3)} MOVE=0
                PURGE_TOOL T=1
            {% endif %}
        {% endif %}
    {% endif %}


#####################################################################
#   PURGE_TOOL
#   Purge lines at the front edge of the bed for T0 (left) or T1 (right).
#   The active tool must already be at printing temperature.
#####################################################################

[gcode_macro PURGE_TOOL]
description: Purge lines at bed edge for T=0 (left) or T=1 (right).
gcode:
    {% set head = params.T|default(0)|int %}
    {% set idxvars = printer["gcode_macro IDEX_VARS"] %}
    {% set t1_purge_start = printer.configfile.config.stepper_x.position_min|float
                            + printer.configfile.config.dual_carriage.position_max|float - 5 %}
    G90
    G92 E0
    G1 Y3 Z0.2 F12000
    {% if head == 0 %}
        G1 X5 F12000
        G1 X65 E10 F1000
        G1 Y5
        G1 X5 E10 F1000
    {% else %}
        G1 X{t1_purge_start} F12000
        G1 X{t1_purge_start - 60} E10 F1000
        G1 Y5
        G1 X{t1_purge_start} E10 F1000
    {% endif %}
    G1 Z5 F3000
    G92 E0
    {% if idxvars.debug_level|int > 1 %}
        RESPOND MSG="PURGE_TOOL: T{head} purge finished."
    {% endif %}


#####################################################################
#   PRINT_END
#####################################################################

[gcode_macro PRINT_END]
description: IDEX-aware end of print macro.
gcode:
    {% set idxvars = printer["gcode_macro IDEX_VARS"] %}
    {% set max_y = printer.configfile.config.stepper_y.position_max|float - 25 %}
    {% set max_z = printer.configfile.config.stepper_z.position_max|int %}
    {% set cur_z = printer.gcode_move.position.z|int %}
    {% set z_lift = [10, max_z - cur_z]|min %}

    M400                                    ; wait for buffer to clear
    G92 E0
    G0 E-5.0 F3600                          ; retract 5mm
    G90
    G0 Y{max_y} F{idxvars.homing_feedrate}  ; move gantry to rear

    # Ensure T0 is active before parking
    T0
    _PARK_TOOL                              ; park T0

    TURN_OFF_HEATERS
    M106 S0 P0                              ; T0 part fan off
    M106 S0 P1                              ; T1 part fan off

    {% if z_lift > 0 %}
        G91
        G0 Z{z_lift} F3000
        G90
    {% endif %}

    BED_MESH_CLEAR
    M84
