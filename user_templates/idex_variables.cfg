########################################### \
######## IDEX VARIABLES CONFIG FILE #######  + --> User-editable IDEX configuration (edit this file for your machine)
########################################### /

# This file contains all user-configurable variables for IDEX / Tridex functionality.
# It is included from printer.cfg just like variables.cfg.
# Do NOT put machine-specific hardware config here — use overrides.cfg for that.

#####################################################################
#   IDEX_VARS — All IDEX configuration variables
#   These are loaded at startup and accessible via:
#     printer["gcode_macro IDEX_VARS"].<variable_name>
#####################################################################

[gcode_macro IDEX_VARS]

# Display color in Mainsail for the active tool. HEX code: RRGGBB
# THE "" ARE REQUIRED!
variable_active_tool_color: "FF6A13"

# Homing location and speed:
###   Variables for safe homing, set to z_endstop / Nudge location OR safe location when using
###   the probe for your Z endstop.
###   This is not the location of the dock for detachable probes.
###   The feed rate is in mm per minute, so 3600 is equal to 60mm/s.
variable_homing_safe_x: -1000
variable_homing_safe_y: -1000

variable_homing_feedrate: 12000
# Set to True for a dockable probe
variable_docking_probe: False

# Distance from end of axis to park the tool head, needed for x/y offsets. default: 3
###   This NEEDS to be larger than your X offset.
###   If your nozzle doesn't line up with your ooze guard then ADJUST THE OOZE GUARD!
###   This variable will be automatically adjusted by the macros, however,
###   recommend larger than your X offset.
variable_park_distance_t0: 3
variable_park_distance_t1: 3

# Print cooling fans names from your toolboard_0.cfg and toolboard_1.cfg.
variable_fan0: 'print_cooling_t0'
variable_fan1: 'print_cooling_t1'

# Tool change parameters.
###   default autopark: 0:inactive - 1:active.
###   z_hop is distance in mm.
###   The feed rate is in mm per minute, so 3600 is equal to 60mm/s.
variable_autopark: 1
variable_z_hop: 1
variable_feedrate: 12000

# Nozzle Scrub / Purge
###   Variables for scrubbing the nozzle and purging when changing tools.
###   The scrub is only used when Classic or Ooze_Prev tool change is selected.
###   These are not used when Swap tool change method is selected.
variable_scrub: 1
variable_scrubs: 5
variable_prep_spd_xy: 3000
variable_purge_length: 0
variable_purge_spd: 150
variable_purge_ret: 0
variable_ooze_dwell: 1
variable_purge_temp_min: 200

# Copy and mirror mode start location for T0. T1 start will be calculated off these values.
###   This position is where to start the synchronization between the tool heads.
###   Recommend placing it near the ending location for your T0 purge.
variable_copy_start_x: 5
variable_copy_start_y: 5
variable_copy_start_z: 5

# Information reporting to the console, default: 0
###   Valid levels: 0 - no reporting to the console.
###                 1 - reporting standard messages.
###                 2 - report everything to the console.
variable_debug_level: 0

# Are tool head LEDs installed and should the macros change them automatically?
###   If tool head LEDs are used then they must be defined in the toolboard config files.
###   The index for the LEDs tells klipper where on the chain these LEDs are at.
###   Stealthburner logo is index 1, Dragonburner logo index is 3.
variable_toolhead_led: False
variable_toolhead_led_logo_idx: "1"
variable_toolhead_led_nozzle_idx: "2,3"

# Input shaper values — applied before each print.
variable_t0_shaper_type_x: "ei"
variable_t0_shaper_type_y: "ei"
variable_t0_shaper_freq_x: 47.8
variable_t0_shaper_freq_y: 62.8
variable_t1_shaper_type_x: "MZV"
variable_t1_shaper_type_y: "MZV"
variable_t1_shaper_freq_x: 46.6
variable_t1_shaper_freq_y: 61.8

# Find current offsets at the beginning of a print. Requires Nudge or similar probe. True or False.
variable_set_offset_at_print_start: False

#####################################################################
#   Variables below here are saved in save_variables.cfg.
#   Values in this file are placeholders and will be overwritten
#   from that file on printer startup.
#   DO NOT EDIT these directly — use the offset adjustment macros or
#   edit save_variables.cfg.
#####################################################################

# Tool head X/Y/Z offsets (T1 relative to T0). Loaded from save_variables.cfg.
variable_offset_x: 0.0
variable_offset_y: 0.0
variable_offset_z: 0.0

# Tool change method: set preferred_tool_change in save_variables.cfg to one of:
#   preferred_tool_change = 'SWAP'      # fastest, moves both heads simultaneously
#   preferred_tool_change = 'CLASSIC'   # classic Tridex, default
#   preferred_tool_change = 'OOZE_PREV' # leaves tool over park zone between changes
# Internal runtime flags — do not edit:
variable_swap_toolheads: 0
variable_immediate_move: 1

# Copy and mirror mode T1 temperatures — sent by the slicer, do not edit:
variable_t0_copy_mirror_temp_start: 0
variable_t1_copy_mirror_temp_start: 0
variable_t0_copy_mirror_temp_print: 0
variable_t1_copy_mirror_temp_print: 0

# Currently active tool (0 = T0, 1 = T1). Managed at runtime.
variable_active_tool: 0

gcode:
